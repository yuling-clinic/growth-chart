// Custom dot component for recordType-aware shapes
function PatientDot(props) {
  const { cx, cy, payload, recordType } = props;
  if (cx == null || cy == null) return null;
  // Check that the data value for this recordType actually exists at this row.
  // Without this, recharts would still call dot for rows where the value is null,
  // rendering stray marks at the chart top edge.
  if (recordType === "initial" && payload?.initial == null) return null;
  if (recordType === "followup" && payload?.followup == null) return null;
  if (recordType === "initial") {
    // Cross/X mark
    const r = 6;
    return (
      <g>
        <line x1={cx - r} y1={cy - r} x2={cx + r} y2={cy + r} stroke="#0c4a6e" strokeWidth={2.5} />
        <line x1={cx - r} y1={cy + r} x2={cx + r} y2={cy - r} stroke="#0c4a6e" strokeWidth={2.5} />
      </g>
    );
  }
  // Default: filled circle
  return <circle cx={cx} cy={cy} r={5} fill="#0c4a6e" stroke="#fff" strokeWidth={2} />;
}

function PercentileChart({ title, unit, sex, metric, measurements, ageRange, treatments, large, target, showTargetLine }) {
  const curveData = useMemo(() => buildPercentileData(sex, metric, ageRange[0], ageRange[1]), [sex, metric, ageRange]);
  const initialPoints = useMemo(() => measurements
    .filter(m => m.age >= ageRange[0] && m.age <= ageRange[1] && m.recordType === "initial")
    .map(m => ({ age: m.age, value: metric === "h" ? m.height : m.weight }))
    .sort((a, b) => a.age - b.age), [measurements, metric, ageRange]);
  const followupPoints = useMemo(() => measurements
    .filter(m => m.age >= ageRange[0] && m.age <= ageRange[1] && m.recordType !== "initial")
    .map(m => ({ age: m.age, value: metric === "h" ? m.height : m.weight }))
    .sort((a, b) => a.age - b.age), [measurements, metric, ageRange]);

  // Combine all points keyed by age. For patient points that fall between reference ages,
  // compute interpolated reference values so the percentile lines stay continuous.
  const combined = useMemo(() => {
    const map = new Map();
    curveData.forEach(p => map.set(p.age, { ...p }));
    const addPatientPoint = (age, key, value) => {
      if (!map.has(age)) {
        // Compute interpolated reference values for this off-grid age
        const ref = percentilesAt(age, sex, metric) || { age };
        map.set(age, ref);
      }
      const row = map.get(age);
      row[key] = value;
      row.patient = value;
    };
    initialPoints.forEach(p => addPatientPoint(p.age, "initial", p.value));
    followupPoints.forEach(p => addPatientPoint(p.age, "followup", p.value));
    const data = Array.from(map.values()).sort((a, b) => a.age - b.age);
    // Inject target height curve: find percentile of target.mid at last REFERENCE age,
    // then interpolate that same percentile at each age point in the data.
    if (metric === "h" && target) {
      const lastRef = REFERENCE[REFERENCE.length - 1][sex];
      const pts = [
        { v: lastRef.h3,  p: 3  }, { v: lastRef.h15, p: 15 },
        { v: lastRef.h25, p: 25 }, { v: lastRef.h50, p: 50 },
        { v: lastRef.h75, p: 75 }, { v: lastRef.h85, p: 85 },
        { v: lastRef.h97, p: 97 },
      ];
      // Find target percentile fraction (0–100) by interpolating within breakpoints
      const tgt = target.mid;
      let targetPct = null;
      if (tgt <= pts[0].v) {
        targetPct = pts[0].p * (tgt / pts[0].v);
      } else if (tgt >= pts[pts.length - 1].v) {
        targetPct = Math.min(99, pts[pts.length - 1].p + (tgt - pts[pts.length - 1].v) * 0.5);
      } else {
        for (let i = 0; i < pts.length - 1; i++) {
          if (tgt >= pts[i].v && tgt <= pts[i + 1].v) {
            const t = (tgt - pts[i].v) / (pts[i + 1].v - pts[i].v);
            targetPct = pts[i].p + t * (pts[i + 1].p - pts[i].p);
            break;
          }
        }
      }
      if (targetPct != null) {
        data.forEach(row => {
          // Get the interpolated ref at this age to find what height = targetPct at this age
          const ref = refAt(row.age, sex);
          if (!ref) return;
          const agePts = [
            { v: ref.h3, p: 3 }, { v: ref.h15, p: 15 },
            { v: ref.h25, p: 25 }, { v: ref.h50, p: 50 },
            { v: ref.h75, p: 75 }, { v: ref.h85, p: 85 },
            { v: ref.h97, p: 97 },
          ];
          let heightAtPct = null;
          if (targetPct <= agePts[0].p) {
            heightAtPct = agePts[0].v - (agePts[0].p - targetPct) / agePts[0].p * agePts[0].v * 0.02;
          } else if (targetPct >= agePts[agePts.length - 1].p) {
            heightAtPct = agePts[agePts.length - 1].v + (targetPct - agePts[agePts.length - 1].p) * 0.05;
          } else {
            for (let i = 0; i < agePts.length - 1; i++) {
              if (targetPct >= agePts[i].p && targetPct <= agePts[i + 1].p) {
                const t = (targetPct - agePts[i].p) / (agePts[i + 1].p - agePts[i].p);
                heightAtPct = agePts[i].v + t * (agePts[i + 1].v - agePts[i].v);
                break;
              }
            }
          }
          row.targetLine = heightAtPct;
        });
      }
    }
    return data;
  }, [curveData, initialPoints, followupPoints, sex, metric, target]);

  const chartHeight = large ? 540 : 340;

  return (
    <div className="bg-white">
      <div className="flex items-baseline justify-between mb-2">
        <h3 className="font-serif text-lg text-stone-900">{title}</h3>
        <span className="text-xs text-stone-500">{unit}</span>
      </div>
      <div style={{ width: "100%", height: chartHeight }}>
        <ResponsiveContainer>
          <ComposedChart data={combined} margin={{ top: 10, right: 30, bottom: 25, left: 0 }}>
            <CartesianGrid strokeDasharray="2 4" stroke="#e7e5e4" />
            <XAxis dataKey="age" type="number"
              domain={[Math.floor(ageRange[0]), Math.ceil(ageRange[1])]}
              ticks={(() => {
                const lo = Math.floor(ageRange[0]);
                const hi = Math.ceil(ageRange[1]);
                const out = [];
                for (let a = lo; a <= hi; a++) out.push(a);
                return out;
              })()}
              tickFormatter={(v) => Math.round(v).toString()}
              tick={{ fontSize: large ? 13 : 11, fill: "#78716c" }}
              label={{ value: "年齡 (歲)", position: "insideBottom", offset: -10, style: { fontSize: large ? 13 : 11, fill: "#78716c" } }} />
            <YAxis tick={{ fontSize: large ? 13 : 11, fill: "#78716c" }} domain={["auto", "auto"]}
              label={{ value: unit, angle: -90, position: "insideLeft", offset: 15, style: { fontSize: large ? 13 : 11, fill: "#78716c" } }} />
            <Tooltip
              cursor={{ stroke: "#a8a29e", strokeWidth: 1, strokeDasharray: "3 3" }}
              content={({ active, payload, label }) => {
                if (!active || !payload || payload.length === 0) return null;
                const visible = payload.filter(p => p.value != null && !isNaN(p.value));
                if (visible.length === 0) return null;
                return (
                  <div style={{
                    background: "white", border: "1px solid #e7e5e4",
                    borderRadius: 8, padding: "8px 12px", fontSize: 12,
                    boxShadow: "0 2px 8px rgba(0,0,0,0.1)"
                  }}>
                    <div style={{ fontWeight: 600, marginBottom: 4, color: "#1c1917" }}>年齡 {fmt(label, 2)} 歲</div>
                    {visible.map((p, i) => (
                      <div key={i} style={{ color: p.color, display: "flex", justifyContent: "space-between", gap: 12 }}>
                        <span>{labelOfPct(p.dataKey)}：</span>
                        <span style={{ fontWeight: 500 }}>{fmt(p.value, 2)}</span>
                      </div>
                    ))}
                  </div>
                );
              }} />
            {PERCENTILES.map(pc => (
              <Line key={pc.key} type="monotone" dataKey={pc.key} stroke={pc.color}
                strokeWidth={pc.key === "p50" ? 2 : 1}
                strokeDasharray={pc.key === "p50" ? "0" : "3 3"}
                dot={false} name={pc.label} isAnimationActive={false} />
            ))}
            {/* Treatment markers - stack labels vertically when they share the same startAge */}
            {(() => {
              const visible = (treatments || []).filter(t => t.startAge >= ageRange[0] && t.startAge <= ageRange[1]);
              // Group by rounded startAge (tolerance ~1 month) and assign stack index
              const sorted = visible.slice().sort((a, b) => (a.startAge || 0) - (b.startAge || 0) || (a.createdAt || "").localeCompare(b.createdAt || ""));
              const stackIdx = new Map();
              const groupKey = (age) => Math.round(age * 12); // group by month resolution
              const counters = {};
              for (const t of sorted) {
                const k = groupKey(t.startAge);
                counters[k] = (counters[k] || 0) + 1;
                stackIdx.set(t.id, counters[k] - 1);
              }
              const lineHeight = large ? 14 : 12;
              return sorted.map(t => (
                <ReferenceLine key={t.id} x={t.startAge} stroke={txColor(t.drug)} strokeWidth={1.5} strokeDasharray="4 3"
                  label={(props) => {
                    const { viewBox } = props;
                    const idx = stackIdx.get(t.id) || 0;
                    const yTop = viewBox.y + 4 + idx * lineHeight;
                    return (
                      <text x={viewBox.x + 4} y={yTop} fill={txColor(t.drug)} fontSize={large ? 12 : 10} fontWeight={600} textAnchor="start" dominantBaseline="hanging">
                        {t.drug}
                      </text>
                    );
                  }} />
              ));
            })()}
            {/* Patient line - connecting all points */}
            <Line type="monotone" dataKey="patient" stroke="#0c4a6e" strokeWidth={2.5}
              dot={false}
              connectNulls name="病人" isAnimationActive={false} />
            {/* Target height curve - same percentile as target.mid traced across all ages */}
            {metric === "h" && target && showTargetLine && (
              <Line type="monotone" dataKey="targetLine" stroke="#7eb8d4" strokeWidth={1.5}
                strokeDasharray="6 4" dot={false} name={`Target ${fmt(target.mid,1)} cm`}
                isAnimationActive={false} legendType="none" connectNulls />
            )}
            {/* Overlay: initial points (× shape) */}
            <Line type="monotone" dataKey="initial" stroke="transparent"
              dot={(props) => <PatientDot {...props} recordType="initial" />}
              connectNulls={false} name="初診" isAnimationActive={false} legendType="none" />
            {/* Overlay: follow-up points (● shape) */}
            <Line type="monotone" dataKey="followup" stroke="transparent"
              dot={(props) => <PatientDot {...props} recordType="followup" />}
              connectNulls={false} name="複診" isAnimationActive={false} legendType="none" />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
      <div className="flex flex-wrap gap-3 mt-2 text-xs text-stone-500 justify-center">
        <LegendItem color="#dc2626" label="3rd / 97th" />
        <LegendItem color="#ea580c" label="15th / 85th" />
        <LegendItem color="#16a34a" label="25th / 50th / 75th" />
        <LegendItem color="#0c4a6e" label="病人" solid />
        <span className="flex items-center gap-1.5"><span className="text-[#0c4a6e] font-bold">×</span> 初診</span>
        <span className="flex items-center gap-1.5"><span className="inline-block w-2 h-2 rounded-full bg-[#0c4a6e]"></span> 複診</span>
        {metric === "h" && target && showTargetLine && (
          <LegendItem color="#7eb8d4" label={`Target ${fmt(target.mid,1)} cm`} />
        )}
      </div>
    </div>
  );
}

function LegendItem({ color, label, solid }) {
  return (
    <div className="flex items-center gap-1.5">
      <span className="inline-block w-5" style={{ borderTop: solid ? `2px solid ${color}` : `1.5px dashed ${color}` }}></span>
      <span>{label}</span>
    </div>
  );
}

function labelOfPct(n) {
  return ({ p3: "3rd", p15: "15th", p25: "25th", p50: "50th", p75: "75th", p85: "85th", p97: "97th", patient: "病人" })[n] || n;
}

function BmiChart({ sex, measurements, ageRange, treatments, large }) {
  const ageMin = Math.max(ageRange[0], 0);
  const ageMax = Math.min(ageRange[1], 17.5);
  const curveData = useMemo(() => buildBmiData(sex, ageMin, ageMax), [sex, ageMin, ageMax]);
  const initialPoints = useMemo(() => measurements
    .filter(m => m.age >= ageMin && m.age <= ageMax && m.bmi != null && m.recordType === "initial")
    .map(m => ({ age: m.age, value: m.bmi }))
    .sort((a, b) => a.age - b.age), [measurements, ageMin, ageMax]);
  const followupPoints = useMemo(() => measurements
    .filter(m => m.age >= ageMin && m.age <= ageMax && m.bmi != null && m.recordType !== "initial")
    .map(m => ({ age: m.age, value: m.bmi }))
    .sort((a, b) => a.age - b.age), [measurements, ageMin, ageMax]);

  const combined = useMemo(() => {
    const map = new Map();
    curveData.forEach(p => map.set(p.age, { ...p }));
    const addPatientPoint = (age, key, value) => {
      if (!map.has(age)) {
        const ref = bmiCutoffsAt(age, sex) || { age };
        map.set(age, ref);
      }
      const row = map.get(age);
      row[key] = value;
      row.patient = value;
    };
    initialPoints.forEach(p => addPatientPoint(p.age, "initial", p.value));
    followupPoints.forEach(p => addPatientPoint(p.age, "followup", p.value));
    return Array.from(map.values()).sort((a, b) => a.age - b.age);
  }, [curveData, initialPoints, followupPoints, sex]);

  const yDomain = useMemo(() => {
    let minV = Infinity, maxV = -Infinity;
    curveData.forEach(p => { minV = Math.min(minV, p.under_line); maxV = Math.max(maxV, p.obese_line); });
    [...initialPoints, ...followupPoints].forEach(p => { minV = Math.min(minV, p.value); maxV = Math.max(maxV, p.value); });
    if (!isFinite(minV)) return [10, 30];
    return [Math.floor(minV - 1), Math.ceil(maxV + 2)];
  }, [curveData, initialPoints, followupPoints]);

  const chartHeight = large ? 540 : 340;

  return (
    <div className="bg-white">
      <div className="flex items-baseline justify-between mb-2">
        <h3 className="font-serif text-lg text-stone-900">BMI 生長曲線</h3>
        <span className="text-xs text-stone-500">kg/m²</span>
      </div>
      <div style={{ width: "100%", height: chartHeight }}>
        <ResponsiveContainer>
          <ComposedChart data={combined} margin={{ top: 10, right: 30, bottom: 25, left: 0 }}>
            <CartesianGrid strokeDasharray="2 4" stroke="#e7e5e4" />
            <XAxis dataKey="age" type="number"
              domain={[Math.floor(ageMin), Math.ceil(ageMax)]}
              ticks={(() => {
                const lo = Math.floor(ageMin);
                const hi = Math.ceil(ageMax);
                const out = [];
                for (let a = lo; a <= hi; a++) out.push(a);
                return out;
              })()}
              tickFormatter={(v) => Math.round(v).toString()}
              tick={{ fontSize: large ? 13 : 11, fill: "#78716c" }}
              label={{ value: "年齡 (歲)", position: "insideBottom", offset: -10, style: { fontSize: large ? 13 : 11, fill: "#78716c" } }} />
            <YAxis tick={{ fontSize: large ? 13 : 11, fill: "#78716c" }} domain={yDomain}
              label={{ value: "kg/m²", angle: -90, position: "insideLeft", offset: 15, style: { fontSize: large ? 13 : 11, fill: "#78716c" } }} />
            <Tooltip
              cursor={{ stroke: "#a8a29e", strokeWidth: 1, strokeDasharray: "3 3" }}
              content={({ active, payload, label }) => {
                if (!active || !payload || payload.length === 0) return null;
                // Filter out entries with no actual value (Recharts includes lines with undefined values)
                const visible = payload.filter(p => p.value != null && !isNaN(p.value));
                if (visible.length === 0) return null;
                return (
                  <div style={{
                    background: "white", border: "1px solid #e7e5e4",
                    borderRadius: 8, padding: "8px 12px", fontSize: 12,
                    boxShadow: "0 2px 8px rgba(0,0,0,0.1)"
                  }}>
                    <div style={{ fontWeight: 600, marginBottom: 4, color: "#1c1917" }}>年齡 {fmt(label, 2)} 歲</div>
                    {visible.map((p, i) => (
                      <div key={i} style={{ color: p.color, display: "flex", justifyContent: "space-between", gap: 12 }}>
                        <span>{p.name}：</span>
                        <span style={{ fontWeight: 500 }}>{fmt(p.value, 2)}</span>
                      </div>
                    ))}
                  </div>
                );
              }} />
            <Line type="monotone" dataKey="under_line" stroke="#2563eb" strokeWidth={1.5} strokeDasharray="4 3" dot={false} name="過輕切點" isAnimationActive={false} />
            <Line type="monotone" dataKey="over_line" stroke="#ea580c" strokeWidth={1.5} strokeDasharray="4 3" dot={false} name="過重切點" isAnimationActive={false} />
            <Line type="monotone" dataKey="obese_line" stroke="#dc2626" strokeWidth={2} dot={false} name="肥胖切點" isAnimationActive={false} />
            {(() => {
              const visible = (treatments || []).filter(t => t.startAge >= ageMin && t.startAge <= ageMax);
              const sorted = visible.slice().sort((a, b) => (a.startAge || 0) - (b.startAge || 0) || (a.createdAt || "").localeCompare(b.createdAt || ""));
              const stackIdx = new Map();
              const groupKey = (age) => Math.round(age * 12);
              const counters = {};
              for (const t of sorted) {
                const k = groupKey(t.startAge);
                counters[k] = (counters[k] || 0) + 1;
                stackIdx.set(t.id, counters[k] - 1);
              }
              const lineHeight = large ? 14 : 12;
              return sorted.map(t => (
                <ReferenceLine key={t.id} x={t.startAge} stroke={txColor(t.drug)} strokeWidth={1.5} strokeDasharray="4 3"
                  label={(props) => {
                    const { viewBox } = props;
                    const idx = stackIdx.get(t.id) || 0;
                    const yTop = viewBox.y + 4 + idx * lineHeight;
                    return (
                      <text x={viewBox.x + 4} y={yTop} fill={txColor(t.drug)} fontSize={large ? 12 : 10} fontWeight={600} textAnchor="start" dominantBaseline="hanging">
                        {t.drug}
                      </text>
                    );
                  }} />
              ));
            })()}
            {/* Patient line */}
            <Line type="monotone" dataKey="patient" stroke="#0c4a6e" strokeWidth={2.5}
              dot={false}
              connectNulls name="病人" isAnimationActive={false} />
            {/* Initial markers (×) */}
            <Line type="monotone" dataKey="initial" stroke="transparent"
              dot={(props) => <PatientDot {...props} recordType="initial" />}
              connectNulls={false} name="初診" isAnimationActive={false} legendType="none" />
            {/* Follow-up markers (●) */}
            <Line type="monotone" dataKey="followup" stroke="transparent"
              dot={(props) => <PatientDot {...props} recordType="followup" />}
              connectNulls={false} name="複診" isAnimationActive={false} legendType="none" />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
      <div className="flex flex-wrap gap-3 mt-2 text-xs text-stone-500 justify-center">
        <LegendItem color="#2563eb" label="過輕切點" />
        <LegendItem color="#ea580c" label="過重切點" />
        <LegendItem color="#dc2626" label="肥胖切點" solid />
        <LegendItem color="#0c4a6e" label="病人" solid />
        <span className="flex items-center gap-1.5"><span className="text-[#0c4a6e] font-bold">×</span> 初診</span>
        <span className="flex items-center gap-1.5"><span className="inline-block w-2 h-2 rounded-full bg-[#0c4a6e]"></span> 複診</span>
      </div>
      <div className="text-[11px] text-stone-400 mt-1 text-center">依衛福部公布之兒童及青少年 BMI 建議值</div>
    </div>
  );
}

// =================== Print View (給家長列印) ===================
// Compact chart for print: smaller dimensions, simplified styling, three side-by-side
function PrintChart({ title, unit, sex, metric, measurements, ageRange }) {
  const isBmi = metric === "bmi";
  const curveData = useMemo(() => {
    if (isBmi) {
      const ageMax = Math.min(ageRange[1], 17.5);
      return buildBmiData(sex, ageRange[0], ageMax);
    }
    return buildPercentileData(sex, metric, ageRange[0], ageRange[1]);
  }, [sex, metric, ageRange, isBmi]);

  const points = useMemo(() => measurements
    .filter(m => m.age >= ageRange[0] && m.age <= ageRange[1] && (isBmi ? m.bmi != null : (metric === "h" ? m.height != null : m.weight != null)))
    .map(m => ({ age: m.age, value: isBmi ? m.bmi : (metric === "h" ? m.height : m.weight), recordType: m.recordType }))
    .sort((a, b) => a.age - b.age), [measurements, metric, ageRange, isBmi]);

  const combined = useMemo(() => {
    const map = new Map();
    curveData.forEach(p => map.set(p.age, { ...p }));
    points.forEach(p => {
      if (!map.has(p.age)) {
        const ref = isBmi ? bmiCutoffsAt(p.age, sex) : percentilesAt(p.age, sex, metric);
        map.set(p.age, ref || { age: p.age });
      }
      const row = map.get(p.age);
      row.patient = p.value;
      if (p.recordType === "initial") row.initial = p.value;
      else row.followup = p.value;
    });
    return Array.from(map.values()).sort((a, b) => a.age - b.age);
  }, [curveData, points, sex, metric, isBmi]);

  const yDomain = useMemo(() => {
    if (!isBmi) return ["auto", "auto"];
    let minV = Infinity, maxV = -Infinity;
    curveData.forEach(p => { minV = Math.min(minV, p.under_line); maxV = Math.max(maxV, p.obese_line); });
    points.forEach(p => { minV = Math.min(minV, p.value); maxV = Math.max(maxV, p.value); });
    if (!isFinite(minV)) return [10, 30];
    return [Math.floor(minV - 1), Math.ceil(maxV + 2)];
  }, [curveData, points, isBmi]);

  return (
    <div style={{ width: "100%" }}>
      <div style={{ fontSize: 10, fontWeight: 600, marginBottom: 2, textAlign: "center" }}>
        {title} <span style={{ color: "#78716c", fontWeight: 400 }}>({unit})</span>
      </div>
      <div style={{ width: "100%", height: 220 }}>
        <ResponsiveContainer>
          <ComposedChart data={combined} margin={{ top: 4, right: 6, bottom: 18, left: 0 }}>
            <CartesianGrid strokeDasharray="2 4" stroke="#e7e5e4" />
            <XAxis dataKey="age" type="number"
              domain={isBmi
                ? [Math.floor(ageRange[0]), Math.ceil(Math.min(ageRange[1], 17.5))]
                : [Math.floor(ageRange[0]), Math.ceil(ageRange[1])]}
              ticks={(() => {
                const lo = Math.floor(ageRange[0]);
                const hi = isBmi ? Math.ceil(Math.min(ageRange[1], 17.5)) : Math.ceil(ageRange[1]);
                const out = [];
                for (let a = lo; a <= hi; a++) out.push(a);
                return out;
              })()}
              tickFormatter={(v) => Math.round(v).toString()}
              tick={{ fontSize: 8, fill: "#78716c" }}
              label={{ value: "歲", position: "insideBottom", offset: -5, style: { fontSize: 8, fill: "#78716c" } }} />
            <YAxis tick={{ fontSize: 8, fill: "#78716c" }} domain={yDomain} width={28} />
            {!isBmi && PERCENTILES.map(pc => (
              <Line key={pc.key} type="monotone" dataKey={pc.key} stroke={pc.color}
                strokeWidth={pc.key === "p50" ? 1.2 : 0.7}
                strokeDasharray={pc.key === "p50" ? "0" : "2 2"}
                dot={false} isAnimationActive={false} />
            ))}
            {isBmi && <>
              <Line type="monotone" dataKey="under_line" stroke="#2563eb" strokeWidth={0.8} strokeDasharray="2 2" dot={false} isAnimationActive={false} />
              <Line type="monotone" dataKey="over_line" stroke="#ea580c" strokeWidth={0.8} strokeDasharray="2 2" dot={false} isAnimationActive={false} />
              <Line type="monotone" dataKey="obese_line" stroke="#dc2626" strokeWidth={1.2} dot={false} isAnimationActive={false} />
            </>}
            <Line type="monotone" dataKey="patient" stroke="#0c4a6e" strokeWidth={1.5} dot={false} connectNulls isAnimationActive={false} />
            <Line type="monotone" dataKey="initial" stroke="transparent"
              dot={(props) => {
                if (props.cx == null || props.payload?.initial == null) return null;
                const r = 3;
                return (
                  <g key={`i-${props.payload.age}`}>
                    <line x1={props.cx - r} y1={props.cy - r} x2={props.cx + r} y2={props.cy + r} stroke="#0c4a6e" strokeWidth={1.5} />
                    <line x1={props.cx - r} y1={props.cy + r} x2={props.cx + r} y2={props.cy - r} stroke="#0c4a6e" strokeWidth={1.5} />
                  </g>
                );
              }}
              connectNulls={false} isAnimationActive={false} legendType="none" />
            <Line type="monotone" dataKey="followup" stroke="transparent"
              dot={(props) => {
                if (props.cx == null || props.payload?.followup == null) return null;
                return <circle key={`f-${props.payload.age}`} cx={props.cx} cy={props.cy} r={2.5} fill="#0c4a6e" />;
              }}
              connectNulls={false} isAnimationActive={false} legendType="none" />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function PrintView({ patient, onClose }) {
  const measurements = (patient.measurements || []).slice().sort((a, b) => a.age - b.age);
  const treatments = (patient.treatments || []).slice().sort((a, b) => (a.startAge || 0) - (b.startAge || 0));
  const target = targetHeight(patient.sex, patient.fatherH, patient.motherH);
  const currentAge = ageFromDates(patient.birth, todayISO());

  // Determine age range for charts (use full range that covers data + buffer)
  const ageRange = useMemo(() => {
    const ages = measurements.map(m => m.age);
    if (ages.length === 0) return [0, 18.5];
    const minA = Math.max(0, Math.min(...ages) - 1);
    const maxA = Math.min(18.5, Math.max(...ages) + 1);
    if (maxA - minA < 4) return [Math.max(0, minA - 1), Math.min(18.5, maxA + 2)];
    return [minA, maxA];
  }, [measurements]);

  // Combine measurements & treatments into one timeline-sorted list for the bottom table
  // Each row = one measurement; treatments shown inline if they happen at that visit
  const timeline = useMemo(() => {
    return measurements.map(m => {
      // Find treatment that started exactly at this measurement (linkedMeasurementId match)
      const linkedTx = treatments.filter(t => t.linkedMeasurementId === m.id);
      // Or treatments with the same date
      const sameDateTx = treatments.filter(t => !t.linkedMeasurementId && t.startDate === m.measureDate);
      return { m, treatments: [...linkedTx, ...sameDateTx] };
    });
  }, [measurements, treatments]);

  // Stand-alone treatments not tied to any measurement
  const orphanTreatments = useMemo(() => {
    const linkedIds = new Set();
    timeline.forEach(t => t.treatments.forEach(tx => linkedIds.add(tx.id)));
    return treatments.filter(t => !linkedIds.has(t.id));
  }, [timeline, treatments]);

  return (
    <div className="print-view">
      {/* On-screen close bar (hidden in print) */}
      <div className="no-print" style={{
        position: "sticky", top: 0, zIndex: 50,
        background: "#0c4a6e", color: "white",
        padding: "8px 16px", display: "flex", justifyContent: "space-between", alignItems: "center"
      }}>
        <span style={{ fontSize: 14, fontWeight: 500 }}>列印預覽（A4 大小）— 點右側按鈕列印或關閉</span>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => window.print()} style={{
            background: "white", color: "#0c4a6e",
            padding: "4px 12px", borderRadius: 6, fontSize: 13, fontWeight: 500
          }}>列印</button>
          <button onClick={onClose} style={{
            background: "transparent", color: "white", border: "1px solid white",
            padding: "4px 12px", borderRadius: 6, fontSize: 13
          }}>關閉預覽</button>
        </div>
      </div>

      <div className="print-page" style={{
        width: "210mm", minHeight: "297mm", margin: "12px auto",
        padding: "12mm 10mm",
        background: "white",
        boxShadow: "0 0 8px rgba(0,0,0,0.08)",
        color: "#1c1917",
        boxSizing: "border-box",
      }}>
        {/* Header — using table layout for max print compatibility */}
        <div style={{ borderBottom: "2px solid #0c4a6e", paddingBottom: 6, marginBottom: 10 }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <tbody>
              <tr>
                <td style={{ fontSize: 16, fontWeight: 700, color: "#0c4a6e", textAlign: "left", padding: 0 }}>玉齡醫師 兒童生長報告</td>
                <td style={{ fontSize: 9, color: "#78716c", textAlign: "right", padding: 0, verticalAlign: "bottom" }}>列印日期：{todayISO()}</td>
              </tr>
            </tbody>
          </table>
        </div>

        {/* Patient info */}
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6,
          fontSize: 10, marginBottom: 10,
          background: "#f5f5f4", padding: 8, borderRadius: 4
        }}>
          <InfoRow label="姓名" value={patient.name} />
          <InfoRow label="病歷號" value={patient.chartNo || "—"} />
          <InfoRow label="性別" value={patient.sex === "boy" ? "男" : "女"} />
          <InfoRow label="出生日期" value={patient.birth} />

                <th style={{ ...thStyle, textAlign: "right" }}>體重%</th>
                <th style={{ ...thStyle, textAlign: "center" }}>BMI</th>
                <th style={{ ...thStyle, textAlign: "right" }}>骨齡</th>
                <th style={thStyle}>治療 / 備註</th>
              </tr>
            </thead>
            <tbody>
              {timeline.map(({ m, treatments: txs }) => {
                const r = refAt(m.age, patient.sex);
                const br = bmiRefAt(m.age, patient.sex);
                const ph = r ? percentileFromRef(m.height, r, "h") : null;
                const pw = r ? percentileFromRef(m.weight, r, "w") : null;
                const cat = br ? bmiCategory(m.bmi, br) : null;
                const txText = txs.map(t => {
                  const cleanNote = t.note && !t.note.startsWith("（由測量紀錄") ? t.note : "";
                  return `${t.drug}${cleanNote ? `(${cleanNote})` : ""}`;
                }).join(", ");
                const noteText = [m.note, txText].filter(Boolean).join("; ");
                return (
                  <tr key={m.id} style={{ borderBottom: "1px solid #f5f5f4" }}>
                    <td style={tdStyle}>{m.measureDate}</td>
                    <td style={tdStyle}>{ageToYM(m.age)}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>{fmt(m.height, 1)}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>{fmt(m.weight, 1)}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>{fmt(m.bmi, 2)}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>{ph != null ? fmt(ph, 0) + "%" : "—"}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>{pw != null ? fmt(pw, 0) + "%" : "—"}</td>
                    <td style={{ ...tdStyle, textAlign: "center", color: cat?.color || "#78716c" }}>{cat?.label || "—"}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>{m.boneAge ? fmt(m.boneAge, 1) : "—"}</td>
                    <td style={{ ...tdStyle, color: txText ? "#0c4a6e" : "#78716c" }}>{noteText || "—"}</td>
                  </tr>
                );
              })}
              {orphanTreatments.map(t => (
                <tr key={t.id} style={{ borderBottom: "1px solid #f5f5f4", background: "#eff6ff" }}>
                  <td style={tdStyle}>{t.startDate}</td>
                  <td style={tdStyle}>{t.startAge != null ? ageToYM(t.startAge) : "—"}</td>
                  <td colSpan={7} style={{ ...tdStyle, color: "#78716c", fontStyle: "italic" }}>—</td>
                  <td style={{ ...tdStyle, color: "#0c4a6e" }}>開始 {t.drug}{t.note && !t.note.startsWith("（由測量紀錄") ? ` (${t.note})` : ""}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {timeline.length === 0 && orphanTreatments.length === 0 && (
            <div style={{ textAlign: "center", padding: "12px 0", fontSize: 9, color: "#78716c" }}>尚無紀錄</div>
          )}
        </div>

        {/* Footer */}
        <div style={{
          marginTop: "auto", paddingTop: 8, borderTop: "1px solid #57534e",
          fontSize: 9.5, color: "#1c1917", lineHeight: 1.4
        }}>
          <div>身高體重百分位依據臺灣 0–18 歲生長 reference (mean ± SD)，BMI 切點依衛福部公布建議值。</div>
        </div>
      </div>
    </div>
  );
}

function InfoRow({ label, value, sub }) {

const thStyle = {
  textAlign: "left",
  padding: "4px 4px",
  fontWeight: 700,
  fontSize: 10,
  color: "#1c1917",
  borderBottom: "1px solid #57534e",
};
const tdStyle = {
  padding: "3px 4px",
  fontSize: 10,
  color: "#1c1917",
};

// =================== Patient Switcher (quick-jump between patients) ===================
function PatientSwitcher({ currentPatient, patients, onSwitchPatient, onNewPatient }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const wrapRef = useRef(null);

  // Close popover when clicking outside
  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  // Other patients first (most recently updated), filtered by search query
  const others = useMemo(() => {
    const list = patients.filter(p => p.id !== currentPatient.id);
    const query = q.trim().toLowerCase();
    const filtered = query
      ? list.filter(p => (p.name + " " + (p.chartNo || "")).toLowerCase().includes(query))
      : list;
    return filtered.slice(0, 50);
  }, [patients, currentPatient.id, q]);

  return (
    <div className="relative print:hidden" ref={wrapRef}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-stone-200 rounded-lg hover:bg-stone-100"
        title="切換到其他病人"
      >
        <Users size={14} /> 切換病人 <ChevronDown size={14} />
      </button>
      {open && (
        <div className="absolute right-0 mt-2 w-80 bg-white rounded-xl border border-stone-200 shadow-xl z-20 overflow-hidden">
          <div className="p-2 border-b border-stone-100">
            <div className="relative">
              <Search size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400" />
              <input
                type="text"
                value={q}
                onChange={e => setQ(e.target.value)}
                placeholder="搜尋姓名或病歷號…"
                className="w-full pl-8 pr-2 py-1.5 text-sm border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900"
                autoFocus
              />
            </div>
          </div>
          <button
            onClick={() => { setOpen(false); onNewPatient(); }}
            className="w-full px-3 py-2.5 text-sm flex items-center gap-2 text-emerald-700 hover:bg-emerald-50 border-b border-stone-100"
          >
            <Plus size={14} /> 新增病人
          </button>
          <div className="max-h-72 overflow-y-auto">
            {others.length === 0 ? (
              <div className="px-3 py-4 text-xs text-stone-400 text-center">
                {q ? "找不到符合的病人" : "目前沒有其他病人"}
              </div>
            ) : (
              others.map(p => {
                const age = ageFromDates(p.birth, todayISO());
                return (
                  <button
                    key={p.id}
                    onClick={() => { setOpen(false); setQ(""); onSwitchPatient(p.id); }}
                    className="w-full px-3 py-2 text-left hover:bg-stone-50 border-b border-stone-50 last:border-b-0 flex items-center justify-between gap-2"
                  >
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-medium text-stone-900 truncate">{p.name}</div>
                      <div className="text-xs text-stone-500 truncate">
                        {p.chartNo ? `${p.chartNo} · ` : ""}{p.sex === "boy" ? "男" : "女"}{age != null ? ` · ${fmt(age, 1)} 歲` : ""}
                      </div>
                    </div>
                  </button>
                );
              })
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// =================== Patient View ===================
function PatientView({ patient, patients, onBack, onSwitchPatient, onNewPatient, onEdit, onAddMeasurement, onPasteImport, onAddBoneAge,
                     onAddTreatment, onEditMeasurement, onEditBoneAge, onEditTreatment,
                     onDeleteMeasurement, onDeleteBoneAge, onDeleteTreatment }) {
  const [showRange, setShowRange] = useState("auto");
  const [chartTab, setChartTab] = useState("h"); // h, w, bmi
  const [showTargetLine, setShowTargetLine] = useState(true);
  const [tab, setTab] = useState("measurements"); // measurements, boneage, treatment
  const [printMode, setPrintMode] = useState(null); // null | "parent"

  // Render the print page to a high-resolution PNG image and download it.
  // PNG bypasses ALL font/print-engine issues — every character is a pixel.
  const downloadPrintPNG = () => {
    setPrintMode("parent");
    setTimeout(() => {
      const printPage = document.querySelector(".print-page");
      if (!printPage) {
        alert("找不到列印內容，請重試");
        setPrintMode(null);
        return;
      }
      if (typeof window.html2canvas !== "function") {
        alert("html2canvas 函式庫尚未載入，請重新整理頁面再試");
        setPrintMode(null);
        return;
      }
      // Render at 2x scale for crisp printing
      window.html2canvas(printPage, {
        scale: 2,
        backgroundColor: "#ffffff",
        useCORS: true,
        logging: false,
      }).then((canvas) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            alert("產生圖片失敗");
            setPrintMode(null);
            return;
          }
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = patient.name + "_生長報告_" + todayISO() + ".png";
          a.click();
          URL.revokeObjectURL(url);
          setPrintMode(null);
        }, "image/png");
      }).catch((err) => {
        console.error(err);
        alert("產生圖片時發生錯誤：" + (err?.message || "未知錯誤"));
        setPrintMode(null);
      });
    }, 400);
  };

  const measurements = (patient.measurements || []).slice().sort((a, b) => a.age - b.age);
  const boneAgeRecords = (patient.boneAges || []).slice().sort((a, b) => a.chronoAge - b.chronoAge);
  const treatments = (patient.treatments || []).slice().sort((a, b) => (a.startAge || 0) - (b.startAge || 0));

  const ageRange = useMemo(() => {
    if (showRange === "0-2") return [0, 2];
    if (showRange === "2-18") return [2, 18.5];
    if (showRange === "0-18") return [0, 18.5];
    const allAges = [...measurements.map(m => m.age), ...boneAgeRecords.map(b => b.chronoAge), ...treatments.map(t => t.startAge).filter(x => x != null)];
    if (allAges.length === 0) return [0, 18.5];
    const minA = Math.max(0, Math.min(...allAges) - 1);
    const maxA = Math.min(18.5, Math.max(...allAges) + 1);
    if (maxA - minA < 3) return [Math.max(0, minA - 1), Math.min(18.5, maxA + 1)];
    return [minA, maxA];
  }, [measurements, boneAgeRecords, treatments, showRange]);

  const target = useMemo(() => targetHeight(patient.sex, patient.fatherH, patient.motherH), [patient.sex, patient.fatherH, patient.motherH]);

  const exportCSV = () => {
    const rows = [["量測日期", "年齡(歲)", "身高(cm)", "體重(kg)", "BMI", "身高百分位", "體重百分位", "BMI分類", "骨齡", "PAH (B-P)", "PAH (骨齡投射)", "備註"]];
    measurements.forEach(m => {
      const r = refAt(m.age, patient.sex);
      const br = bmiRefAt(m.age, patient.sex);
      const ph = r ? percentileFromRef(m.height, r, "h") : null;
      const pw = r ? percentileFromRef(m.weight, r, "w") : null;
      const cat = br ? bmiCategory(m.bmi, br) : null;
      const pah = m.boneAge ? computePAH(patient.sex, m.boneAge, m.age, m.height) : null;
      const pah2 = m.boneAge ? computePAH2(patient.sex, m.boneAge, m.height) : null;
      rows.push([m.measureDate, fmt(m.age, 2), fmt(m.height, 1), fmt(m.weight, 1), fmt(m.bmi, 2),
        ph != null ? fmt(ph, 1) + "%" : "—",
        pw != null ? fmt(pw, 1) + "%" : "—",
        cat?.label || "—",
        m.boneAge ? fmt(m.boneAge, 1) : "—",
        pah && pah.pah ? fmt(pah.pah, 1) : "—",
        pah2 && pah2.pah ? fmt(pah2.pah, 1) : "—",
        m.note || ""]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${patient.name}_${patient.chartNo || "growth"}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="min-h-screen bg-stone-50">
      {printMode === "parent" && (
        <PrintView patient={patient} onClose={() => setPrintMode(null)} />
      )}
      <div className={printMode === "parent" ? "hidden" : ""}>
      <Header title={`${patient.name} · ${patient.sex === "boy" ? "男" : "女"}`} onBack={onBack}
        right={
          <div className="flex gap-2 print:hidden">
            <PatientSwitcher
              currentPatient={patient}
              patients={patients || []}
              onSwitchPatient={onSwitchPatient}
              onNewPatient={onNewPatient}
            />
            <button onClick={downloadPrintPNG} className="flex items-center gap-1 px-3 py-1.5 text-sm bg-emerald-600 text-white rounded-lg hover:bg-emerald-700"><Download size={14} /> 下載列印圖 (PNG)</button>
            <button onClick={() => setPrintMode("parent")} className="flex items-center gap-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg hover:bg-stone-100"><Printer size={14} /> 預覽</button>
            <button onClick={exportCSV} className="flex items-center gap-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg hover:bg-stone-100"><Download size={14} /> CSV</button>
            <button onClick={onEdit} className="flex items-center gap-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg hover:bg-stone-100"><Edit3 size={14} /> 編輯</button>
          </div>
        } />
      <div className="max-w-7xl mx-auto p-6 space-y-6">
        <div className="bg-white rounded-xl border border-stone-200 p-5">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <Stat label="病歷號" value={patient.chartNo || "—"} />
            <Stat label="出生日期" value={patient.birth} />
            <Stat label="目前年齡" value={`${fmt(ageFromDates(patient.birth, todayISO()), 2)} 歲`} />
            <Stat label="紀錄筆數" value={`${measurements.length} 筆`} />
            <Stat label="父親身高" value={patient.fatherH ? `${fmt(patient.fatherH, 1)} cm` : "—"} />
            <Stat label="母親身高" value={patient.motherH ? `${fmt(patient.motherH, 1)} cm` : "—"} />
            {target ? (
              <div className="md:col-span-2">
                <div className="text-xs text-stone-500 uppercase tracking-wider">Target Height</div>
                <div className="font-medium text-stone-900 mt-0.5">
                  {fmt(target.mid, 1)} cm <span className="text-xs text-stone-500">(範圍 {fmt(target.lower, 1)} – {fmt(target.upper, 1)} cm)</span>
                </div>
              </div>
            ) : <div className="md:col-span-2"></div>}
          </div>
        </div>

        <div className="flex items-center gap-2 print:hidden flex-wrap">
          <span className="text-sm text-stone-600">顯示範圍：</span>
          {[{ v: "auto", l: "自動" }, { v: "0-2", l: "0–2 歲" }, { v: "2-18", l: "2–18 歲" }, { v: "0-18", l: "0–18 歲" }].map(o => (
            <button key={o.v} onClick={() => setShowRange(o.v)} className={`px-3 py-1.5 text-xs rounded-lg border transition ${showRange === o.v ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600 hover:bg-stone-50"}`}>{o.l}</button>
          ))}
          {target && chartTab === "h" && (
            <button onClick={() => setShowTargetLine(v => !v)}
              className={`px-3 py-1.5 text-xs rounded-lg border transition flex items-center gap-1.5 ${showTargetLine ? "bg-stone-100 border-stone-400 text-stone-700" : "bg-white border-stone-200 text-stone-400 hover:bg-stone-50"}`}>
              <span className="inline-block w-4" style={{ borderTop: "1.5px dashed #b0b0b0" }}></span>
              Target Height
            </button>
          )}
        </div>

        <div className="bg-white rounded-xl border border-stone-200 overflow-hidden">
          <div className="flex border-b border-stone-200 bg-stone-50">
            <button onClick={() => setChartTab("h")} className={`flex-1 py-3 px-4 text-sm border-b-2 transition ${chartTab === "h" ? "border-stone-900 text-stone-900 font-medium bg-white" : "border-transparent text-stone-500 hover:text-stone-900"}`}>身高 Height</button>
            <button onClick={() => setChartTab("w")} className={`flex-1 py-3 px-4 text-sm border-b-2 transition ${chartTab === "w" ? "border-stone-900 text-stone-900 font-medium bg-white" : "border-transparent text-stone-500 hover:text-stone-900"}`}>體重 Weight</button>
            <button onClick={() => setChartTab("bmi")} className={`flex-1 py-3 px-4 text-sm border-b-2 transition ${chartTab === "bmi" ? "border-stone-900 text-stone-900 font-medium bg-white" : "border-transparent text-stone-500 hover:text-stone-900"}`}>BMI</button>
          </div>
          <div className="p-4">
            {chartTab === "h" && (
              <PercentileChart title="身高生長曲線" unit="cm" sex={patient.sex} metric="h" measurements={measurements} ageRange={ageRange} treatments={treatments} large target={target} showTargetLine={showTargetLine} />
            )}
            {chartTab === "w" && (
              <PercentileChart title="體重生長曲線" unit="kg" sex={patient.sex} metric="w" measurements={measurements} ageRange={ageRange} treatments={treatments} large target={target} showTargetLine={showTargetLine} />
            )}
            {chartTab === "bmi" && (
              <BmiChart sex={patient.sex} measurements={measurements} ageRange={ageRange} treatments={treatments} large />
            )}
          </div>
        </div>

        {/* Tabs */}
        <div className="bg-white rounded-xl border border-stone-200 overflow-hidden">
          <div className="flex border-b border-stone-200 bg-stone-50">
            <TabBtn active={tab === "measurements"} onClick={() => setTab("measurements")} icon={<TrendingUp size={14} />} label="測量紀錄" count={measurements.length} />
            <TabBtn active={tab === "boneage"} onClick={() => setTab("boneage")} icon={<Bone size={14} />} label="骨齡紀錄" count={boneAgeRecords.length} />
            <TabBtn active={tab === "treatment"} onClick={() => setTab("treatment")} icon={<Activity size={14} />} label="治療紀錄" count={treatments.length} />
          </div>

          {tab === "measurements" && (
            <div>
              <div className="flex items-center justify-end gap-2 px-5 py-3 border-b border-stone-200 print:hidden">
                <button onClick={onPasteImport} className="flex items-center gap-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg hover:bg-stone-100"><ClipboardPaste size={14} /> 批次貼上</button>
                <button onClick={onAddMeasurement} className="flex items-center gap-1 px-3 py-1.5 text-sm bg-stone-900 text-white rounded-lg hover:bg-stone-800"><Plus size={14} /> 新增紀錄</button>
              </div>
              {measurements.length === 0 ? (
                <div className="p-12 text-center text-stone-500">尚無測量紀錄</div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-stone-50 text-xs text-stone-600 uppercase tracking-wider">
                      <tr>
                        <th className="text-left px-4 py-2.5">量測日期</th>
                        <th className="text-left px-4 py-2.5">年齡</th>
                        <th className="text-right px-4 py-2.5">身高</th>
                        <th className="text-right px-4 py-2.5">體重</th>
                        <th className="text-right px-4 py-2.5">BMI</th>
                        <th className="text-right px-4 py-2.5">身高百分位</th>
                        <th className="text-right px-4 py-2.5">體重百分位</th>
                        <th className="text-center px-4 py-2.5">BMI 分類</th>
                        <th className="text-right px-4 py-2.5">骨齡</th>
                        <th className="text-right px-4 py-2.5" title="Bayley-Pinneau 法">PAH ¹</th>
                        <th className="text-right px-4 py-2.5" title="骨齡百分位投射法">PAH ²</th>
                        <th className="text-left px-4 py-2.5">備註</th>
                        <th className="px-4 py-2.5 print:hidden"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-stone-100">
                      {measurements.map(m => {
                        const r = refAt(m.age, patient.sex);
                        const br = bmiRefAt(m.age, patient.sex);
                        const ph = r ? percentileFromRef(m.height, r, "h") : null;
                        const pw = r ? percentileFromRef(m.weight, r, "w") : null;
                        const cat = br ? bmiCategory(m.bmi, br) : null;
                        const pah = m.boneAge ? computePAH(patient.sex, m.boneAge, m.age, m.height) : null;
                        const pah2 = m.boneAge ? computePAH2(patient.sex, m.boneAge, m.height) : null;
                        return (
                          <tr key={m.id} className="hover:bg-stone-50">
                            <td className="px-4 py-2.5">{m.measureDate}{m.grade && <span className="ml-1 text-xs text-stone-400">({GRADE_OPTIONS.find(g => g.value === m.grade)?.label} {m.semester})</span>}</td>
                            <td className="px-4 py-2.5">{fmt(m.age, 2)}</td>
                            <td className="px-4 py-2.5 text-right">{fmt(m.height, 1)}</td>
                            <td className="px-4 py-2.5 text-right">{fmt(m.weight, 1)}</td>
                            <td className="px-4 py-2.5 text-right">{fmt(m.bmi, 2)}</td>
                            <td className={`px-4 py-2.5 text-right font-medium ${pctClass(ph)}`}>{ph == null ? "—" : `${fmt(ph, 1)}%`}</td>
                            <td className={`px-4 py-2.5 text-right font-medium ${pctClass(pw)}`}>{pw == null ? "—" : `${fmt(pw, 1)}%`}</td>
                            <td className="px-4 py-2.5 text-center font-medium" style={{ color: cat?.color || "#a8a29e" }}>{cat?.label || "—"}</td>
                            <td className="px-4 py-2.5 text-right">{m.boneAge ? fmt(m.boneAge, 1) : "—"}</td>
                            <td className="px-4 py-2.5 text-right text-indigo-700 font-medium">{pah && pah.pah ? fmt(pah.pah, 1) : pah && pah.outOfRange ? <span className="text-amber-600 text-xs">超出</span> : "—"}</td>
                            <td className="px-4 py-2.5 text-right text-purple-700 font-medium">{pah2 && pah2.pah ? fmt(pah2.pah, 1) : pah2 && pah2.outOfRange ? <span className="text-amber-600 text-xs">超出</span> : "—"}</td>
                            <td className="px-4 py-2.5 text-stone-500">{m.note || "—"}</td>
                            <td className="px-4 py-2.5 text-right print:hidden">

function ExportDialog({ onClose, onDone }) {
  const [encrypt, setEncrypt] = useState(false);
  const [password, setPassword] = useState("");
  const [confirmPwd, setConfirmPwd] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (encrypt) {
      if (password.length < 4) { alert("密碼至少 4 字元"); return; }
      if (password !== confirmPwd) { alert("兩次密碼不一致"); return; }
    }
    setBusy(true);
    try {
      const data = await exportAllData();
      const finalBlob = encrypt ? await encryptData(data, password) : data;
      const json = JSON.stringify(finalBlob, null, encrypt ? 0 : 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `growth-chart-backup-${date}${encrypt ? ".enc" : ""}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setLastExportTime();
      onDone();
    } catch (e) {
      alert("匯出失敗：" + e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <Modal onClose={onClose} size="md">
      <div className="px-6 py-4 border-b border-stone-200">
        <h2 className="text-lg font-serif flex items-center gap-2"><Download size={18} /> 匯出備份</h2>
      </div>
      <div className="p-6 space-y-4">
        <div className="text-sm text-stone-600">
          將所有病人資料匯出為一個 .json 檔案。請存到 USB 隨身碟、雲端硬碟，或自己的 email 信箱。
        </div>
        <label className="flex items-start gap-2 text-sm cursor-pointer p-3 border border-stone-200 rounded-lg hover:bg-stone-50">
          <input type="checkbox" checked={encrypt} onChange={e => setEncrypt(e.target.checked)} className="mt-1" />
          <div>
            <div className="font-medium text-stone-900">使用密碼加密</div>
            <div className="text-xs text-stone-500 mt-0.5">建議勾選 — 即使檔案外流，沒有密碼也無法解讀（AES-256-GCM）</div>
          </div>
        </label>
        {encrypt && (
          <>
            <Field label="密碼">
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" autoFocus />
            </Field>
            <Field label="再次輸入密碼">
              <input type="password" value={confirmPwd} onChange={e => setConfirmPwd(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
            </Field>
            <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
              ⚠ 請務必牢記密碼。密碼遺失後資料將無法還原。
            </div>
          </>
        )}
      </div>
      <div className="px-6 py-4 border-t border-stone-200 flex justify-end gap-2">
        <button onClick={onClose} className="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg" disabled={busy}>取消</button>
        <button onClick={submit} disabled={busy} className="px-4 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800 disabled:bg-stone-300">
          {busy ? "處理中..." : "下載備份檔"}
        </button>
      </div>
    </Modal>
  );
}

function ImportDialog({ onClose, onDone }) {
  const [file, setFile] = useState(null);
  const [fileBlob, setFileBlob] = useState(null);
  const [password, setPassword] = useState("");
  const [needPassword, setNeedPassword] = useState(false);
  const [preview, setPreview] = useState(null);
  const [mode, setMode] = useState("merge");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const handleFile = async (f) => {
    setError(null);
    setFile(f);
    setPreview(null);
    setNeedPassword(false);
    try {
      const text = await f.text();
      const blob = JSON.parse(text);
      setFileBlob(blob);
      if (blob.encrypted) {
        setNeedPassword(true);
      } else {
        // Plain — show preview
        if (blob.index && blob.patients) {
          setPreview({ count: blob.index.length, exportedAt: blob.exportedAt });
        } else {
          setError("檔案格式不正確");
        }
      }
    } catch (e) {
      setError("無法讀取檔案：" + e.message);
    }
  };

  const tryDecrypt = async () => {
    if (!fileBlob || !password) return;
    try {
      const decrypted = await decryptData(fileBlob, password);
      setPreview({ count: decrypted.index.length, exportedAt: decrypted.exportedAt, decrypted });
      setError(null);
    } catch (e) {
      setError(e.message);
    }
  };

  const doImport = async () => {
    if (!preview) return;
    const data = preview.decrypted || fileBlob;
    if (mode === "replace") {
      if (!confirm("「取代」將清除目前所有資料，確定？")) return;
    }
    setBusy(true);
    try {
      const result = await importAllData(data, mode);
      alert(`匯入完成：共 ${result.count} 位病人（新增 ${result.added}、合併 ${result.merged}）`);
      onDone();
    } catch (e) {
      alert("匯入失敗：" + e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <Modal onClose={onClose} size="md">
      <div className="px-6 py-4 border-b border-stone-200">
        <h2 className="text-lg font-serif flex items-center gap-2"><ClipboardPaste size={18} /> 匯入備份</h2>
      </div>
      <div className="p-6 space-y-4">
        <div className="text-sm text-stone-600">
          選擇先前匯出的 .json 備份檔還原資料。
        </div>
        <Field label="選擇備份檔">
          <input type="file" accept=".json,.enc" onChange={e => e.target.files[0] && handleFile(e.target.files[0])} className="w-full text-sm" />
        </Field>
        {file && <div className="text-xs text-stone-500">已選擇：{file.name}</div>}
        {error && (
          <div className="text-sm bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-red-700">{error}</div>
        )}
        {needPassword && !preview && (
          <>
            <div className="text-sm bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-amber-900">
              此檔案已加密，請輸入密碼。
            </div>
            <Field label="密碼">
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && tryDecrypt()} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" autoFocus />
            </Field>
            <button onClick={tryDecrypt} disabled={!password} className="px-4 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800 disabled:bg-stone-300 text-sm">
              解密
            </button>
          </>
        )}
        {preview && (
          <>
            <div className="text-sm bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 text-emerald-900">
              ✓ 讀取成功：{preview.count} 位病人 · 備份時間 {new Date(preview.exportedAt).toLocaleString('zh-TW')}
            </div>
            <Field label="匯入方式">
              <div className="space-y-2">
                <label className="flex items-start gap-2 text-sm cursor-pointer p-3 border border-stone-200 rounded-lg hover:bg-stone-50">
                  <input type="radio" name="mode" value="merge" checked={mode === "merge"} onChange={() => setMode("merge")} className="mt-1" />
                  <div>
                    <div className="font-medium text-stone-900">合併（推薦）</div>
                    <div className="text-xs text-stone-500 mt-0.5">同一位病人的紀錄合併保留 — 同時保有舊紀錄與新增紀錄，僅相同 id 的單筆資料以較新者覆蓋</div>
                  </div>
                </label>
                <label className="flex items-start gap-2 text-sm cursor-pointer p-3 border border-stone-200 rounded-lg hover:bg-stone-50">
                  <input type="radio" name="mode" value="replace" checked={mode === "replace"} onChange={() => setMode("replace")} className="mt-1" />
                  <div>
                    <div className="font-medium text-stone-900">取代</div>
                    <div className="text-xs text-stone-500 mt-0.5">刪除目前所有資料，只保留備份檔內容</div>
                  </div>
                </label>
              </div>
            </Field>
          </>
        )}
      </div>
      <div className="px-6 py-4 border-t border-stone-200 flex justify-end gap-2">
        <button onClick={onClose} className="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg" disabled={busy}>取消</button>
        <button onClick={doImport} disabled={!preview || busy} className="px-4 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800 disabled:bg-stone-300">
          {busy ? "處理中..." : "確認匯入"}
        </button>
      </div>
    </Modal>
  );
}

function App() {
  const [view, setView] = useState("list");
  const [patients, setPatients] = useState([]);
  const [currentId, setCurrentId] = useState(null);
  const [currentPatient, setCurrentPatient] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showPatientForm, setShowPatientForm] = useState(false);
  const [editingPatient, setEditingPatient] = useState(false);
  const [showMeasurementForm, setShowMeasurementForm] = useState(false);
  const [editingMeasurement, setEditingMeasurement] = useState(null);
  const [showPasteImport, setShowPasteImport] = useState(false);
  const [showBoneAgeForm, setShowBoneAgeForm] = useState(false);
  const [editingBoneAge, setEditingBoneAge] = useState(null);
  const [showTreatmentForm, setShowTreatmentForm] = useState(false);
  const [editingTreatment, setEditingTreatment] = useState(null);
  const [showExportDialog, setShowExportDialog] = useState(false);
  const [showImportDialog, setShowImportDialog] = useState(false);
  const [lastExport, setLastExport] = useState(null);

  useEffect(() => {
    setLastExport(getLastExportTime());
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const idx = await loadIndex();
        setPatients(idx);
      } catch (e) { console.error(e); }
      finally { setLoading(false); }
    })();
  }, []);

  useEffect(() => {
    if (!currentId) { setCurrentPatient(null); return; }
    (async () => {
      const p = await loadPatient(currentId);
      setCurrentPatient(p);
    })();
  }, [currentId]);

  const persistPatient = async (updated) => {
    await savePatient(updated);
    setCurrentPatient(updated);
    const idx = await loadIndex();
    const newIdx = idx.map(p => p.id === updated.id ? indexEntry(updated) : p);
    await saveIndex(newIdx);
    setPatients(newIdx);
  };

  const handleSavePatient = async (data) => {
    if (editingPatient && currentPatient) {
      await persistPatient({ ...currentPatient, ...data });
    } else {
      const np = { id: uid(), ...data, measurements: [], boneAges: [], treatments: [], createdAt: new Date().toISOString() };
      await savePatient(np);
      const idx = await loadIndex();
      const newIdx = [...idx, indexEntry(np)];
      await saveIndex(newIdx);
      setPatients(newIdx);
      // Auto-navigate into the newly created patient
      setCurrentId(np.id);
      setView("patient");
    }
    setShowPatientForm(false); setEditingPatient(false);
  };

  const handleDeletePatient = async (id) => {
    await deletePatient(id);
    const idx = await loadIndex();
    const newIdx = idx.filter(p => p.id !== id);
    await saveIndex(newIdx);
    setPatients(newIdx);
    if (currentId === id) { setCurrentId(null); setView("list"); }
  };

  const handleSaveMeasurement = async (m) => {
    if (!currentPatient) return;
    const ms = currentPatient.measurements || [];
    const existing = ms.findIndex(x => x.id === m.id);
    const newMs = existing >= 0 ? ms.map(x => x.id === m.id ? m : x) : [...ms, m];
    newMs.sort((a, b) => a.age - b.age);

    // Also sync bone age entry if present in this measurement
    let newBoneAges = currentPatient.boneAges || [];
    const existingBaIdx = newBoneAges.findIndex(b => b.linkedMeasurementId === m.id);
    if (m.boneAge != null) {
      const baEntry = {
        id: existingBaIdx >= 0 ? newBoneAges[existingBaIdx].id : uid(),
        measureDate: m.measureDate,
        chronoAge: m.age,
        boneAge: m.boneAge,
        linkedHeight: m.height,
        note: "",
        linkedMeasurementId: m.id,
        createdAt: existingBaIdx >= 0 ? newBoneAges[existingBaIdx].createdAt : new Date().toISOString(),
      };
      if (existingBaIdx >= 0) {
        newBoneAges = newBoneAges.map((x, i) => i === existingBaIdx ? baEntry : x);
      } else {
        newBoneAges = [...newBoneAges, baEntry];
      }
    } else if (existingBaIdx >= 0) {
      // bone age was removed from measurement - remove the synced bone age entry too
      newBoneAges = newBoneAges.filter((_, i) => i !== existingBaIdx);
    }
    newBoneAges.sort((a, b) => a.chronoAge - b.chronoAge);

    // Sync treatments if present (supports both old single .treatment and new array .treatments)
    let newTreatments = currentPatient.treatments || [];
    // Build incoming list of treatments tied to this measurement
    const incomingTxs = [];
    if (m.treatments && Array.isArray(m.treatments)) {
      incomingTxs.push(...m.treatments);
    } else if (m.treatment && m.treatment.drug) {
      // Backward compat for old single .treatment shape
      incomingTxs.push(m.treatment);
    }
    if (incomingTxs.length > 0) {
      // Remove all existing treatments linked to this measurement (will be replaced)
      newTreatments = newTreatments.filter(t => t.linkedMeasurementId !== m.id);
      // Add new ones
      for (const t of incomingTxs) {
        newTreatments.push({
          id: t.id || uid(),
          drug: t.drug,
          isCustom: t.isCustom || false,
          startDate: m.measureDate,
          startAge: m.age,
          note: t.note || "",
          linkedMeasurementId: m.id,
          createdAt: t.createdAt || new Date().toISOString(),
        });
      }
      newTreatments.sort((a, b) => (a.startAge || 0) - (b.startAge || 0));
    } else {
      // No treatments in measurement -> remove any orphan ones linked to this measurement
      // (case: user unchecked the treatment on edit)
      const before = newTreatments.length;
      newTreatments = newTreatments.filter(t => t.linkedMeasurementId !== m.id);
    }

    await persistPatient({
      ...currentPatient,
      measurements: newMs,
      boneAges: newBoneAges,
      treatments: newTreatments,
      lastVisit: newMs.length ? newMs[newMs.length - 1].measureDate : null,
    });
    setShowMeasurementForm(false); setEditingMeasurement(null);
  };

  const handleDeleteMeasurement = async (mid) => {
    if (!currentPatient) return;
    const newMs = (currentPatient.measurements || []).filter(m => m.id !== mid);
    await persistPatient({ ...currentPatient, measurements: newMs, lastVisit: newMs.length ? newMs[newMs.length - 1].measureDate : null });
  };

  const handlePasteImport = async (records) => {
    if (!currentPatient) return;
    const ms = currentPatient.measurements || [];
    const newMs = [...ms, ...records];
    newMs.sort((a, b) => a.age - b.age);
    await persistPatient({ ...currentPatient, measurements: newMs, lastVisit: newMs.length ? newMs[newMs.length - 1].measureDate : null });
    setShowPasteImport(false);
  };

  const handleSaveBoneAge = async (b) => {
    if (!currentPatient) return;
    const list = currentPatient.boneAges || [];
    const existing = list.findIndex(x => x.id === b.id);
    const newList = existing >= 0 ? list.map(x => x.id === b.id ? b : x) : [...list, b];
    newList.sort((a, b) => a.chronoAge - b.chronoAge);
    await persistPatient({ ...currentPatient, boneAges: newList });
    setShowBoneAgeForm(false); setEditingBoneAge(null);
  };

  const handleDeleteBoneAge = async (id) => {
    if (!currentPatient) return;
    const newList = (currentPatient.boneAges || []).filter(b => b.id !== id);
    await persistPatient({ ...currentPatient, boneAges: newList });
  };

  const handleSaveTreatment = async (t) => {
    if (!currentPatient) return;
    const list = currentPatient.treatments || [];
    const existing = list.findIndex(x => x.id === t.id);
    const newList = existing >= 0 ? list.map(x => x.id === t.id ? t : x) : [...list, t];
    newList.sort((a, b) => (a.startAge || 0) - (b.startAge || 0));
    await persistPatient({ ...currentPatient, treatments: newList });
    setShowTreatmentForm(false); setEditingTreatment(null);
  };

  const handleDeleteTreatment = async (id) => {
    if (!currentPatient) return;
    const newList = (currentPatient.treatments || []).filter(t => t.id !== id);
    await persistPatient({ ...currentPatient, treatments: newList });
  };

  if (view === "patient" && currentPatient) {
    return (
      <>
        <PatientView
          patient={currentPatient}
          patients={patients}
          onSwitchPatient={(id) => { setCurrentId(id); }}
          onNewPatient={() => { setEditingPatient(false); setShowPatientForm(true); }}
          onBack={() => { setView("list"); setCurrentId(null); }}
          onEdit={() => { setEditingPatient(true); setShowPatientForm(true); }}
          onAddMeasurement={() => { setEditingMeasurement(null); setShowMeasurementForm(true); }}
          onPasteImport={() => setShowPasteImport(true)}
          onAddBoneAge={() => { setEditingBoneAge(null); setShowBoneAgeForm(true); }}
          onAddTreatment={() => { setEditingTreatment(null); setShowTreatmentForm(true); }}
          onEditMeasurement={(m) => {
            // Pre-populate treatments by looking up linked entries in patient's treatments
            const linkedTxs = (currentPatient.treatments || []).filter(t => t.linkedMeasurementId === m.id);
            const enriched = linkedTxs.length > 0 ? { ...m, treatments: linkedTxs } : m;
            setEditingMeasurement(enriched);
            setShowMeasurementForm(true);
          }}
          onEditBoneAge={(b) => { setEditingBoneAge(b); setShowBoneAgeForm(true); }}
          onEditTreatment={(t) => { setEditingTreatment(t); setShowTreatmentForm(true); }}
          onDeleteMeasurement={handleDeleteMeasurement}
          onDeleteBoneAge={handleDeleteBoneAge}
          onDeleteTreatment={handleDeleteTreatment}
        />
        {showPatientForm && <PatientForm initial={editingPatient ? currentPatient : null} onSave={handleSavePatient} onCancel={() => { setShowPatientForm(false); setEditingPatient(false); }} />}
        {showMeasurementForm && <MeasurementForm patient={currentPatient} initial={editingMeasurement} onSave={handleSaveMeasurement} onCancel={() => { setShowMeasurementForm(false); setEditingMeasurement(null); }} />}
        {showPasteImport && <PasteImport patient={currentPatient} onImport={handlePasteImport} onCancel={() => setShowPasteImport(false)} />}
        {showBoneAgeForm && <BoneAgeForm patient={currentPatient} initial={editingBoneAge} onSave={handleSaveBoneAge} onCancel={() => { setShowBoneAgeForm(false); setEditingBoneAge(null); }} />}
        {showTreatmentForm && <TreatmentForm patient={currentPatient} initial={editingTreatment} onSave={handleSaveTreatment} onCancel={() => { setShowTreatmentForm(false); setEditingTreatment(null); }} />}
      </>
    );
  }

  return (
    <>
      <PatientList
        patients={patients}
        loading={loading}
        onSelect={(id) => { setCurrentId(id); setView("patient"); }}
        onNew={() => { setEditingPatient(false); setShowPatientForm(true); }}
        onDelete={handleDeletePatient}
        onExport={() => setShowExportDialog(true)}
        onImport={() => setShowImportDialog(true)}
        lastExport={lastExport}
      />
      {showPatientForm && <PatientForm onSave={handleSavePatient} onCancel={() => { setShowPatientForm(false); setEditingPatient(false); }} />}
      {showExportDialog && (
        <ExportDialog onClose={() => setShowExportDialog(false)} onDone={() => { setLastExport(getLastExportTime()); setShowExportDialog(false); }} />
      )}
      {showImportDialog && (
        <ImportDialog onClose={() => setShowImportDialog(false)} onDone={async () => {
          const idx = await loadIndex();
          setPatients(idx);
          setShowImportDialog(false);
        }} />
      )}
    </>
  );
}

function indexEntry(p) {
  return { id: p.id, name: p.name, chartNo: p.chartNo, birth: p.birth, sex: p.sex, fatherH: p.fatherH, motherH: p.motherH, measurements: p.measurements || [], lastVisit: p.lastVisit };
}

// Mount the app
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
