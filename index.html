// =================== Helpers ===================
function ageFromDates(birth, measure) {
  if (!birth || !measure) return null;
  const b = new Date(birth), m = new Date(measure);
  if (isNaN(b) || isNaN(m)) return null;
  const ms = m - b;
  if (ms < 0) return null;
  return ms / (365.2425 * 24 * 3600 * 1000);
}

function ageFromGradeSemester(birthISO, gradeLabel, semester) {
  if (!birthISO) return null;
  const grade = parseGrade(gradeLabel);
  if (grade == null) return null;
  const b = new Date(birthISO);
  if (isNaN(b)) return null;
  // Taiwan 小一 entry rule: child must be 6 years old by 9/1 of academic year.
  // - Born on or before 9/1 of year Y → enters G1 in year Y+6
  // - Born on or after 9/2 of year Y → enters G1 in year Y+7
  const birthYear = b.getFullYear();
  const birthMonth = b.getMonth() + 1; // 1-12
  const birthDay = b.getDate();
  // Check if birth is on or before 9/1
  const beforeOrOnSep1 = (birthMonth < 9) || (birthMonth === 9 && birthDay <= 1);
  const g1StartYear = beforeOrOnSep1 ? birthYear + 6 : birthYear + 7;
  // grade.n: K1=-2, K2=-1, K3=0, G1=1, G2=2, ... so academic start year is:
  //   for G1, year = g1StartYear; for K3 (n=0), year = g1StartYear - 1; etc.
  const academicStartYear = g1StartYear + (grade - 1);
  const measure = semester === "上"
    ? new Date(`${academicStartYear}-09-01`)
    : new Date(`${academicStartYear + 1}-02-11`);
  return { age: ageFromDates(birthISO, measure), inferredDate: measure.toISOString().slice(0, 10) };
}

  { value: "G4", label: "小四", n: 4 },
  { value: "G5", label: "小五", n: 5 },
  { value: "G6", label: "小六", n: 6 },
  { value: "G7", label: "國一", n: 7 },
  { value: "G8", label: "國二", n: 8 },
  { value: "G9", label: "國三", n: 9 },
  { value: "H1", label: "高一", n: 10 },
  { value: "H2", label: "高二", n: 11 },
  { value: "H3", label: "高三", n: 12 },
];
function parseGrade(v) {
  const o = GRADE_OPTIONS.find(g => g.value === v);
  return o ? o.n : null;
}

// Map Chinese labels to grade value codes
const GRADE_LABEL_MAP = {
  "小一": "G1", "小二": "G2", "小三": "G3", "小四": "G4", "小五": "G5", "小六": "G6",
  "國一": "G7", "國二": "G8", "國三": "G9",
  "高一": "H1", "高二": "H2", "高三": "H3",
  "幼小": "K1", "幼中": "K2", "幼大": "K3",
  "小班": "K1", "中班": "K2", "大班": "K3",
  "幼兒園小班": "K1", "幼兒園中班": "K2", "幼兒園大班": "K3",
};

function refAt(age, sex) {
  if (age < REFERENCE[0].age || age > REFERENCE[REFERENCE.length - 1].age) return null;
  for (let i = 0; i < REFERENCE.length - 1; i++) {
    const a = REFERENCE[i], b = REFERENCE[i + 1];
    if (age >= a.age && age <= b.age) {
      const t = (age - a.age) / (b.age - a.age);
      const A = a[sex], B = b[sex];
      const interp = (k) => A[k] + (B[k] - A[k]) * t;
      return {
        h3: interp("h3"), h15: interp("h15"), h25: interp("h25"),
        h50: interp("h50"), h75: interp("h75"), h85: interp("h85"), h97: interp("h97"),
        w3: interp("w3"), w15: interp("w15"), w25: interp("w25"),
        w50: interp("w50"), w75: interp("w75"), w85: interp("w85"), w97: interp("w97"),
      };
    }
  }
  return null;
}

function bmiRefAt(age, sex) {
  if (age < BMI_REF[0].age) return null;
  if (age > BMI_REF[BMI_REF.length - 1].age) return BMI_REF[BMI_REF.length - 1][sex];
  for (let i = 0; i < BMI_REF.length - 1; i++) {
    const a = BMI_REF[i], b = BMI_REF[i + 1];
    if (age >= a.age && age <= b.age) {
      const t = (age - a.age) / (b.age - a.age);
      const A = a[sex], B = b[sex];
      return {
        under: A.under + (B.under - A.under) * t,
        over: A.over + (B.over - A.over) * t,
        obese: A.obese + (B.obese - A.obese) * t,
      };
    }
  }
  return null;
}

function percentileOf(value, mean, sd) {
  if (value == null || sd == null || sd === 0) return null;
  const z = (value - mean) / sd;
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989423 * Math.exp(-z * z / 2);
  let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  if (z > 0) p = 1 - p;
  return p * 100;
}

// Compute percentile rank by interpolating within the reference percentile bands
// Returns a value 0-100 using piecewise linear interpolation between known percentiles
function percentileFromRef(value, ref, metric) {
  if (value == null || ref == null) return null;
  const prefix = metric; // "h" or "w"
  const bands = [
    { pct: 3,  lo: -Infinity,        hi: ref[prefix + "3"]  },
    { pct: 9,  lo: ref[prefix + "3"],  hi: ref[prefix + "15"] },
    { pct: 20, lo: ref[prefix + "15"], hi: ref[prefix + "25"] },
    { pct: 37.5, lo: ref[prefix + "25"], hi: ref[prefix + "50"] },
    { pct: 62.5, lo: ref[prefix + "50"], hi: ref[prefix + "75"] },
    { pct: 80, lo: ref[prefix + "75"], hi: ref[prefix + "85"] },
    { pct: 91, lo: ref[prefix + "85"], hi: ref[prefix + "97"] },
    { pct: 97, lo: ref[prefix + "97"], hi: Infinity           },
  ];
  // Sorted breakpoints with their percentile values
  const pts = [
    { v: ref[prefix + "3"],  p: 3  },
    { v: ref[prefix + "15"], p: 15 },
    { v: ref[prefix + "25"], p: 25 },
    { v: ref[prefix + "50"], p: 50 },
    { v: ref[prefix + "75"], p: 75 },
    { v: ref[prefix + "85"], p: 85 },
    { v: ref[prefix + "97"], p: 97 },
  ];
  if (value <= pts[0].v) return pts[0].p * value / pts[0].v; // extrapolate toward 0
  if (value >= pts[pts.length-1].v) return Math.min(99.9, pts[pts.length-1].p + (value - pts[pts.length-1].v) / pts[pts.length-1].v * 2);
  for (let i = 0; i < pts.length - 1; i++) {
    if (value >= pts[i].v && value <= pts[i+1].v) {
      const t = (value - pts[i].v) / (pts[i+1].v - pts[i].v);
      return pts[i].p + t * (pts[i+1].p - pts[i].p);
    }
  }
  return null;
}

function bmiCategory(bmi, ref) {
  if (!bmi || !ref) return null;
  if (bmi < ref.under) return { label: "過輕", color: "#2563eb" };
  if (bmi < ref.over) return { label: "正常", color: "#16a34a" };
  if (bmi < ref.obese) return { label: "過重", color: "#ea580c" };
  return { label: "肥胖", color: "#dc2626" };
}

// Bayley-Pinneau category determination
function bpCategory(boneAge, chronoAge) {
  if (boneAge == null || chronoAge == null) return null;
  const diff = boneAge - chronoAge;
  if (diff > 1) return "acc";
  if (diff < -1) return "ret";
  return "avg";
}

// Look up B-P percentage with linear interpolation
function bpPercent(sex, category, boneAge) {
  const tbl = BP_TABLE[sex]?.[category];
  if (!tbl) return null;
  // Strict: no extrapolation beyond table range
  if (boneAge < tbl[0].ba || boneAge > tbl[tbl.length - 1].ba) return null;
  for (let i = 0; i < tbl.length - 1; i++) {
    const a = tbl[i], b = tbl[i + 1];
    if (boneAge >= a.ba && boneAge <= b.ba) {
      const t = (boneAge - a.ba) / (b.ba - a.ba);
      return a.pct + (b.pct - a.pct) * t;
    }
  }
  return null;
}

// Get the available bone age range for a given sex+category (for showing user the limits)
function bpRange(sex, category) {
  const tbl = BP_TABLE[sex]?.[category];
  if (!tbl || tbl.length === 0) return null;
  return { min: tbl[0].ba, max: tbl[tbl.length - 1].ba };
}

// Compute predicted adult height (Bayley-Pinneau)
function computePAH(sex, boneAge, chronoAge, height) {
  if (!boneAge || !height || !chronoAge) return null;
  const cat = bpCategory(boneAge, chronoAge);
  const pct = bpPercent(sex, cat, boneAge);
  if (pct == null) {
    const range = bpRange(sex, cat);
    return { pah: null, category: cat, percent: null, outOfRange: true, rangeMin: range?.min, rangeMax: range?.max };
  }
  return { pah: height / (pct / 100), category: cat, percent: pct, outOfRange: false };
}

// Algorithm 2: z-score projection by bone age
// Look up reference at bone age (not chrono age), compute z-score, project to 18.5y at same z.
// Rationale: assume the patient will continue growing along the same percentile curve.
function computePAH2(sex, boneAge, height) {
  if (!boneAge || !height) return null;
  const refAtBone = refAt(boneAge, sex);
  if (!refAtBone) {
    return { pah: null, outOfRange: true, reason: `骨齡 ${boneAge} 超出 reference 範圍 (0–18.5 歲)` };
  }
  // Compute the percentile rank at bone age using percentile-interpolation
  const pct = percentileFromRef(height, refAtBone, "h");
  // Map that percentile back to the final height at the last reference age
  const finalRef = REFERENCE[REFERENCE.length - 1][sex];
  // Interpolate to find height at that percentile in the final reference
  const finalPts = [
    { v: finalRef.h3, p: 3 }, { v: finalRef.h15, p: 15 },
    { v: finalRef.h25, p: 25 }, { v: finalRef.h50, p: 50 },
    { v: finalRef.h75, p: 75 }, { v: finalRef.h85, p: 85 },
    { v: finalRef.h97, p: 97 },
  ];
  let pah = null;
  if (pct <= finalPts[0].p) {
    pah = finalPts[0].v - (finalPts[0].p - pct) / finalPts[0].p * finalPts[0].v * 0.05;
  } else if (pct >= finalPts[finalPts.length-1].p) {
    pah = finalPts[finalPts.length-1].v + (pct - finalPts[finalPts.length-1].p) * 0.1;
  } else {
    for (let i = 0; i < finalPts.length - 1; i++) {
      if (pct >= finalPts[i].p && pct <= finalPts[i+1].p) {
        const t = (pct - finalPts[i].p) / (finalPts[i+1].p - finalPts[i].p);
        pah = finalPts[i].v + t * (finalPts[i+1].v - finalPts[i].v);
        break;
      }
    }
  }
  // Approximate z-score from percentile for display purposes
  const pFrac = pct / 100;
  const zApprox = pFrac < 0.5
    ? -(Math.sqrt(-2 * Math.log(pFrac)))
    : Math.sqrt(-2 * Math.log(1 - pFrac));
  return { pah, z: zApprox, percentile: pct, outOfRange: false };
}

// Mid-parental target height
function targetHeight(sex, fatherH, motherH) {
  if (!fatherH || !motherH) return null;
  const mid = sex === "boy" ? (fatherH + motherH + 13) / 2 : (fatherH + motherH - 13) / 2;
  return { mid, lower: mid - 8.5, upper: mid + 8.5 };
}

function buildPercentileData(sex, metric, ageMin, ageMax) {
  return REFERENCE
    .filter(p => p.age >= ageMin && p.age <= ageMax)
    .map(p => {
      const d = p[sex];
      const row = { age: p.age };
      row.p3  = d[metric + "3"];
      row.p15 = d[metric + "15"];
      row.p25 = d[metric + "25"];
      row.p50 = d[metric + "50"];
      row.p75 = d[metric + "75"];
      row.p85 = d[metric + "85"];
      row.p97 = d[metric + "97"];
      return row;
    });
}

// Compute percentile values at an arbitrary age via linear interpolation between CSV breakpoints
function percentilesAt(age, sex, metric) {
  const ref = refAt(age, sex);
  if (!ref) return null;
  return {
    age,
    p3:  ref[metric + "3"],
    p15: ref[metric + "15"],
    p25: ref[metric + "25"],
    p50: ref[metric + "50"],
    p75: ref[metric + "75"],
    p85: ref[metric + "85"],
    p97: ref[metric + "97"],
  };
}

function buildBmiData(sex, ageMin, ageMax) {
  return BMI_REF
    .filter(p => p.age >= ageMin && p.age <= ageMax)
    .map(p => ({
      age: p.age,
      under_line: p[sex].under,
      over_line: p[sex].over,
      obese_line: p[sex].obese,
    }));
}

// Compute BMI cutoff values at an arbitrary age via linear interpolation
function bmiCutoffsAt(age, sex) {
  const ref = bmiRefAt(age, sex);
  if (!ref) return null;
  return { age, under_line: ref.under, over_line: ref.over, obese_line: ref.obese };
}

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const todayISO = () => new Date().toISOString().slice(0, 10);
function fmt(v, d = 1) {
  if (v == null || isNaN(v)) return "—";
  return Number(v).toFixed(d);
}

// Format age in years (decimal) as "Yy Mm" e.g. 12.5 → "12y 6m", 6.25 → "6y 3m"
function ageToYM(ageYears) {
  if (ageYears == null || isNaN(ageYears)) return "—";
  const totalMonths = Math.round(ageYears * 12);
  const y = Math.floor(totalMonths / 12);
  const m = totalMonths % 12;
  return `${y}y ${m}m`;
}

// =================== Paste parser ===================
// Parses a block of text containing rows of [date|grade+semester]+height+weight
// Returns array of { mode, measureDate?, grade?, semester?, height, weight }
function parsePastedData(text, birthISO) {
  if (!text || !text.trim()) return { rows: [], errors: [] };
  const rows = [];
  const errors = [];
  let lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);

  // Pre-pass: if a line contains multiple grade tokens, split before each grade token.
  // E.g. "Date Ht Wt 中班上 106.1 15.8 中班下 108.7 16.9" → ["中班上 106.1 15.8", "中班下 108.7 16.9"]
  const GRADE_RE = /(小一|小二|小三|小四|小五|小六|國一|國二|國三|高一|高二|高三|幼小|幼中|幼大|小班|中班|大班|幼兒園小班|幼兒園中班|幼兒園大班)(上|下)?/g;
  const splitLines = [];
  for (const line of lines) {
    const matches = [...line.matchAll(GRADE_RE)];
    if (matches.length >= 2) {
      // Split at each match position
      for (let i = 0; i < matches.length; i++) {
        const start = matches[i].index;
        const end = (i + 1 < matches.length) ? matches[i + 1].index : line.length;
        const chunk = line.slice(start, end).trim();
        if (chunk) splitLines.push(chunk);
      }
    } else {
      splitLines.push(line);
    }
  }
  lines = splitLines;

  for (const line of lines) {
    // Skip likely header lines containing "date"/"ht"/"wt"/"日期"/"身高"/"體重"/"BMI" and no numbers
    if (/^[a-zA-Z\u4e00-\u9fa5\s\/]+$/.test(line) && !/\d/.test(line)) continue;

    // Tokenize by whitespace, slash, comma, tab
    const tokens = line.split(/[\s,]+/).filter(t => t.length > 0);
    if (tokens.length < 2) continue;

    // Try to identify each token's role
    let dateToken = null, gradeToken = null, semesterToken = null;
    let height = null, weight = null;
    const numbers = [];

    for (const tok of tokens) {
      // Skip header words like "Date", "Ht", "Wt", "日期", "身高", "體重", "BMI"
      if (/^(date|ht|wt|height|weight|bmi|日期|身高|體重)$/i.test(tok)) continue;
      // ISO date or ROC date with separators
      if (/^\d{4}[-/.]\d{1,2}[-/.]\d{1,2}$/.test(tok) || /^\d{2,3}[-/.]\d{1,2}[-/.]\d{1,2}$/.test(tok)) {
        dateToken = tok;
        continue;
      }
      // Compact 8-digit Western date YYYYMMDD (e.g. 20260101)
      if (/^\d{8}$/.test(tok)) {
        const y = parseInt(tok.slice(0, 4)), m = parseInt(tok.slice(4, 6)), d = parseInt(tok.slice(6, 8));
        if (y >= 1900 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
          dateToken = `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          continue;
        }
      }
      // Compact 7-digit ROC date YYYMMDD (e.g. 1150101 → 民國 115 年)
      if (/^\d{7}$/.test(tok)) {
        const rocY = parseInt(tok.slice(0, 3)), m = parseInt(tok.slice(3, 5)), d = parseInt(tok.slice(5, 7));
        if (rocY >= 1 && rocY <= 200 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
          dateToken = `${rocY + 1911}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          continue;
        }
      }
      // Compact 6-digit ROC date YYMMDD (e.g. 940315 → 民國 94 年; older patients)
      if (/^\d{6}$/.test(tok)) {
        const rocY = parseInt(tok.slice(0, 2)), m = parseInt(tok.slice(2, 4)), d = parseInt(tok.slice(4, 6));
        if (rocY >= 30 && rocY <= 130 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
          dateToken = `${rocY + 1911}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          continue;
        }
      }
      // Grade + semester e.g. 小一上, 國二下
      const m = tok.match(/^(小一|小二|小三|小四|小五|小六|國一|國二|國三|高一|高二|高三|幼小|幼中|幼大|小班|中班|大班|幼兒園小班|幼兒園中班|幼兒園大班)(上|下)?$/);
      if (m) {
        gradeToken = GRADE_LABEL_MAP[m[1]];
        if (m[2]) semesterToken = m[2];
        continue;
      }
      // Pure 上/下 standalone
      if (tok === "上" || tok === "下") { semesterToken = tok; continue; }
      // Number?
      const num = parseFloat(tok);
      if (!isNaN(num)) numbers.push(num);
    }

    // Assume the first two reasonable numbers are height and weight
    // Heuristic: height is typically 50-200, weight 2-150
    if (numbers.length >= 2) {
      // Pick the most plausible height/weight pairing: usually first = height, second = weight
      // But if first looks like weight (small) and second like height (large), swap.
      let h = numbers[0], w = numbers[1];
      if (h < 30 && w > 50) { h = numbers[1]; w = numbers[0]; }
      // sanity check
      if (h >= 30 && h <= 220 && w >= 2 && w <= 200) {
        height = h; weight = w;
      } else if (h >= 30 && h <= 220) {
        height = h; // only height plausible
      } else if (w >= 2 && w <= 200) {
        weight = w; // only weight plausible (first num was bad)
      }
    } else if (numbers.length === 1) {
      // Single number — guess whether it's height or weight by range
      const n = numbers[0];
      if (n >= 30 && n <= 220) height = n;
      else if (n >= 2 && n < 30) weight = n;
    }

    if (height == null && weight == null) {
      errors.push(`無法解析（缺少身高體重）：${line}`);
      continue;
    }

    if (dateToken) {
      // normalize date — accept /, -, . as separators
      let dateISO = dateToken.replace(/[/.]/g, "-");
      // ROC date detection: if first part is 2-3 digits and < 200, treat as ROC year
      const parts = dateISO.split("-");
      if (parts[0].length <= 3 && parseInt(parts[0]) < 200) {
        const rocY = parseInt(parts[0]);
        parts[0] = String(rocY + 1911);
        dateISO = parts.join("-");
      }
      // pad month/day
      const p2 = dateISO.split("-");
      if (p2.length === 3) {
        dateISO = `${p2[0]}-${p2[1].padStart(2, "0")}-${p2[2].padStart(2, "0")}`;
      }
      rows.push({
        mode: "date", measureDate: dateISO,
        height, weight,
        rawLine: line,
      });
    } else if (gradeToken && semesterToken) {
      const r = ageFromGradeSemester(birthISO, gradeToken, semesterToken);
      rows.push({
        mode: "grade",
        grade: gradeToken, semester: semesterToken,
        measureDate: r?.inferredDate,
        height, weight,
        rawLine: line,
      });
    } else {
      errors.push(`無日期或年級資訊：${line}`);
    }
  }

  return { rows, errors };
}

// =================== Storage (localStorage) ===================
const STORAGE_KEY_PREFIX = "patient:";
const PATIENT_INDEX_KEY = "patient_index";
const LAST_EXPORT_KEY = "last_export_time";

async function loadIndex() {
  try {
    const raw = localStorage.getItem(PATIENT_INDEX_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
async function saveIndex(idx) {
  localStorage.setItem(PATIENT_INDEX_KEY, JSON.stringify(idx));
}
async function loadPatient(id) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_PREFIX + id);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
async function savePatient(p) {
  localStorage.setItem(STORAGE_KEY_PREFIX + p.id, JSON.stringify(p));
}
async function deletePatient(id) {
  localStorage.removeItem(STORAGE_KEY_PREFIX + id);
}

// Export / Import
async function exportAllData() {
  const idx = await loadIndex();
  const patients = {};
  for (const p of idx) {
    const data = await loadPatient(p.id);
    if (data) patients[p.id] = data;
  }
  return {
    version: "1.0",
    exportedAt: new Date().toISOString(),
    patientCount: idx.length,
    index: idx,
    patients,
  };
}

// Merge two patient records at the record level
// Rule: each list (measurements, boneAges, treatments) is deduped by id;
// when same id exists in both, the one with newer createdAt wins.
function mergePatients(existing, incoming) {
  // Match patient identity: id is the technical key, but if the patient was created
  // separately on two devices, ids differ — for safety we trust id matching here.
  const merged = { ...existing, ...incoming };
  // For each list, dedupe by id
  const mergeList = (a, b) => {
    const map = new Map();
    for (const item of (a || [])) map.set(item.id, item);
    for (const item of (b || [])) {
      const cur = map.get(item.id);
      if (!cur) {
        map.set(item.id, item);
      } else {
        // Keep newer (by createdAt, fallback to deeper data)
        const ta = new Date(cur.createdAt || 0).getTime();
        const tb = new Date(item.createdAt || 0).getTime();
        map.set(item.id, tb > ta ? item : cur);
      }
    }
    return Array.from(map.values());
  };
  merged.measurements = mergeList(existing.measurements, incoming.measurements);
  merged.boneAges = mergeList(existing.boneAges, incoming.boneAges);
  merged.treatments = mergeList(existing.treatments, incoming.treatments);
  // Recompute lastVisit from sorted measurements
  if (merged.measurements.length > 0) {
    const sorted = merged.measurements.slice().sort((a, b) => (a.measureDate || "").localeCompare(b.measureDate || ""));
    merged.lastVisit = sorted[sorted.length - 1].measureDate;
  }
  // Patient-level fields (name, chartNo, fatherH, etc.):
  // Prefer non-empty values; if both have values, keep the one with later updatedAt or fall back to incoming
  const fields = ["name", "chartNo", "birth", "sex", "fatherH", "motherH"];
  for (const f of fields) {
    if (incoming[f] != null && incoming[f] !== "") {
      // keep incoming (assumed newer or from new edit)
      merged[f] = incoming[f];
    } else if (existing[f] != null && existing[f] !== "") {
      merged[f] = existing[f];
    }
  }
  return merged;
}

async function importAllData(payload, mode) {
  // mode: "replace" or "merge"
  if (!payload || !payload.index || !payload.patients) {
    throw new Error("\u8cc7\u6599\u683c\u5f0f\u4e0d\u6b63\u78ba");
  }
  if (mode === "replace") {
    // Clear everything first
    const oldIdx = await loadIndex();
    for (const p of oldIdx) {
      await deletePatient(p.id);
    }
    await saveIndex([]);
  }
  // Now write incoming with per-record merge
  const currentIdx = await loadIndex();
  const idMap = new Map(currentIdx.map(p => [p.id, p]));
  let added = 0, mergedCount = 0;
  for (const incomingIdxEntry of payload.index) {
    const incomingFull = payload.patients[incomingIdxEntry.id];
    if (!incomingFull) continue;
    if (mode === "merge" && idMap.has(incomingIdxEntry.id)) {
      // Load existing full data
      const existingFull = await loadPatient(incomingIdxEntry.id);
      if (existingFull) {
        const merged = mergePatients(existingFull, incomingFull);
        await savePatient(merged);
        idMap.set(merged.id, indexEntry(merged));
        mergedCount++;
      } else {
        await savePatient(incomingFull);
        idMap.set(incomingFull.id, indexEntry(incomingFull));
        added++;
      }
    } else {
      await savePatient(incomingFull);
      idMap.set(incomingFull.id, indexEntry(incomingFull));
      added++;
    }
  }
  await saveIndex(Array.from(idMap.values()));
  return { count: payload.index.length, added, merged: mergedCount };
}

// AES-GCM encryption helper for export
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
    keyMat,
    { name: "AES-GCM", length: 256 },
    false, ["encrypt", "decrypt"]
  );
}

async function encryptData(data, password) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ciphertext = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    enc.encode(JSON.stringify(data))
  );
  // Combine: salt(16) + iv(12) + ciphertext
  const combined = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
  combined.set(salt, 0);
  combined.set(iv, salt.length);
  combined.set(new Uint8Array(ciphertext), salt.length + iv.length);
  // Base64 encode
  let binary = "";
  combined.forEach(b => binary += String.fromCharCode(b));
  return { encrypted: true, payload: btoa(binary), version: "1.0" };
}

async function decryptData(blob, password) {
  if (!blob.encrypted || !blob.payload) throw new Error("\u4e0d\u662f\u52a0\u5bc6\u6a94");
  const binary = atob(blob.payload);
  const combined = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) combined[i] = binary.charCodeAt(i);
  const salt = combined.slice(0, 16);
  const iv = combined.slice(16, 28);
  const ciphertext = combined.slice(28);
  const key = await deriveKey(password, salt);
  try {
    const plaintext = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv }, key, ciphertext
    );
    return JSON.parse(new TextDecoder().decode(plaintext));
  } catch (e) {
    throw new Error("\u5bc6\u78bc\u932f\u8aa4\u6216\u8cc7\u6599\u635f\u58de");
  }
}

// Custom date input with auto-advance: YYYY → MM → DD
function DateInput({ value, onChange, autoFocus }) {
  const yearRef = useRef(null);
  const monthRef = useRef(null);
  const dayRef = useRef(null);
  // Track the last full ISO we emitted, so we can ignore parent echoing it back
  const lastEmittedRef = useRef(value || "");

  const initialParts = (value || "").split("-");
  const [y, setY] = useState(initialParts[0] || "");
  const [m, setM] = useState(initialParts[1] || "");
  const [d, setD] = useState(initialParts[2] || "");

  // Sync FROM parent only when value differs from what we last emitted.
  // This handles cases like "edit existing record" but ignores echoes.
  useEffect(() => {
    if (value === lastEmittedRef.current) return;
    const ps = (value || "").split("-");
    setY(ps[0] || "");
    setM(ps[1] || "");
    setD(ps[2] || "");
    lastEmittedRef.current = value || "";
  }, [value]);

  const emit = (yy, mm, dd) => {
    let next;
    if (!yy && !mm && !dd) {
      next = "";
    } else if (yy.length === 4 && mm.length >= 1 && dd.length >= 1) {
      next = `${yy}-${mm.padStart(2, "0")}-${dd.padStart(2, "0")}`;
    } else {
      // Partial: emit invalid ISO so consumer's date parsers return null
      next = `${yy}-${mm}-${dd}`;
    }
    lastEmittedRef.current = next;
    onChange(next);
  };

  // Defer focus to next tick so React finishes its update cycle first.
  const focusNext = (refObj) => {
    if (!refObj.current) return;
    setTimeout(() => {
      try {
        refObj.current?.focus();
        refObj.current?.select?.();
      } catch (e) {}
    }, 0);
  };

  const handleY = (e) => {
    const v = e.target.value.replace(/\D/g, "").slice(0, 4);
    setY(v);
    emit(v, m, d);
    if (v.length === 4) focusNext(monthRef);
  };
  const handleM = (e) => {
    const v = e.target.value.replace(/\D/g, "").slice(0, 2);
    setM(v);
    emit(y, v, d);
    if (v.length === 2) focusNext(dayRef);
  };
  const handleD = (e) => {
    const v = e.target.value.replace(/\D/g, "").slice(0, 2);
    setD(v);
    emit(y, m, v);
  };

  // Backspace at start of empty field → jump to previous field
  const handleMKey = (e) => {
    if (e.key === "Backspace" && m === "" && y.length > 0) {
      e.preventDefault();
      focusNext(yearRef);
    }
  };
  const handleDKey = (e) => {
    if (e.key === "Backspace" && d === "" && m.length > 0) {
      e.preventDefault();
      focusNext(monthRef);
    }
  };

  return (
    <div className="flex items-center gap-1 px-2 py-1.5 border border-stone-200 rounded-lg focus-within:border-stone-900 bg-white">
      <input
        ref={yearRef}
        type="text"
        inputMode="numeric"
        value={y}
        onChange={handleY}
        placeholder="YYYY"
        autoFocus={autoFocus}
        className="w-14 px-1 py-1 text-center focus:outline-none"
      />
      <span className="text-stone-300">/</span>
      <input
        ref={monthRef}
        type="text"
        inputMode="numeric"
        value={m}
        onChange={handleM}
        onKeyDown={handleMKey}
        placeholder="MM"
        className="w-9 px-1 py-1 text-center focus:outline-none"
      />
      <span className="text-stone-300">/</span>
      <input
        ref={dayRef}
        type="text"
        inputMode="numeric"
        value={d}
        onChange={handleD}
        onKeyDown={handleDKey}
        placeholder="DD"
        className="w-9 px-1 py-1 text-center focus:outline-none"
      />
    </div>
  );
}

function Modal({ children, onClose, size = "md" }) {
  const widthMap = { sm: "max-w-md", md: "max-w-lg", lg: "max-w-2xl", xl: "max-w-4xl" };
  // Track where mousedown started, so dragging out from an input (text selection)
  // doesn't accidentally close the modal.
  const mouseDownOnBackdrop = useRef(false);
  return (
    <div
      className="fixed inset-0 bg-stone-900/40 flex items-center justify-center z-50 p-4"
      onMouseDown={e => { mouseDownOnBackdrop.current = (e.target === e.currentTarget); }}
      onMouseUp={e => {
        if (mouseDownOnBackdrop.current && e.target === e.currentTarget) {
          onClose();
        }
        mouseDownOnBackdrop.current = false;
      }}
    >
      <div className={`bg-white rounded-xl shadow-2xl w-full ${widthMap[size]} max-h-[90vh] overflow-y-auto`}>
        {children}
      </div>
    </div>
  );
}

// =================== Patient Form ===================
// Parse free-text input to extract patient demographics.
// Recognizes: name (Chinese 2-4 chars), chartNo (5-10 digits), birth (ISO/ROC dates),
// sex (男/女/M/F/Boy/Girl), parent heights ("Father 174 cm", "母親 163").
function parsePatientText(text) {
  if (!text || !text.trim()) return null;
  const result = { name: null, chartNo: null, birth: null, sex: null, fatherH: null, motherH: null };
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const fullText = lines.join(" ");

  // 1. Birth date — try several formats in order of specificity
  let birthFound = false;
  // (a) ISO with separators: 2017/10/24 or 2017-10-24 or 2017.10.24
  const isoSep = fullText.match(/(?<![\d])(\d{4})[-/.年](\d{1,2})[-/.月](\d{1,2})/);
  if (isoSep) {
    const [_, y, m, d] = isoSep;
    result.birth = `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
    birthFound = true;
  }
  // (b) ROC with separators: 106/10/24 or 民國 106 年 10 月 24 日
  if (!birthFound) {
    const rocSep = fullText.match(/(?<![\d])(\d{2,3})[-/.年](\d{1,2})[-/.月](\d{1,2})/);
    if (rocSep) {
      const [_, y, m, d] = rocSep;
      const year = parseInt(y) + 1911;
      // Sanity check: result year should be reasonable
      if (year >= 1900 && year <= 2100) {
        result.birth = `${year}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
        birthFound = true;
      }
    }
  }
  // (c) Pure 8-digit YYYYMMDD without separators: 20190101
  if (!birthFound) {
    const iso8 = fullText.match(/(?<![\d])(\d{4})(\d{2})(\d{2})(?![\d])/);
    if (iso8) {
      const [_, y, m, d] = iso8;
      const year = parseInt(y), month = parseInt(m), day = parseInt(d);
      // Sanity check on date validity
      if (year >= 1900 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
        result.birth = `${y}-${m}-${d}`;
        birthFound = true;
      }
    }
  }
  // (d) Pure 7-digit ROC YYYMMDD without separators: 1080101 → 民國 108 年 1 月 1 日
  if (!birthFound) {
    const roc7 = fullText.match(/(?<![\d])(\d{3})(\d{2})(\d{2})(?![\d])/);
    if (roc7) {
      const [_, y, m, d] = roc7;
      const rocY = parseInt(y), month = parseInt(m), day = parseInt(d);
      const year = rocY + 1911;
      if (rocY >= 1 && rocY <= 200 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
        result.birth = `${year}-${m}-${d}`;
        birthFound = true;
      }
    }
  }
  // (e) Pure 6-digit ROC YYMMDD without separators: 940315 → 民國 94 年 3 月 15 日 (older patients)
  if (!birthFound) {
    const roc6 = fullText.match(/(?<![\d])(\d{2})(\d{2})(\d{2})(?![\d])/);
    if (roc6) {
      const [_, y, m, d] = roc6;
      const rocY = parseInt(y), month = parseInt(m), day = parseInt(d);
      const year = rocY + 1911;
      if (rocY >= 30 && rocY <= 130 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
        result.birth = `${year}-${m}-${d}`;
        birthFound = true;
      }
    }
  }

  // 2. Sex — multiple strategies
  // (a) Labeled: 性別: 女, sex: F, gender: male
  const labeledSex = fullText.match(/(?:性別|sex|gender)[\s:：]*([\u4e00-\u9fa5a-zA-Z]+)/i);
  if (labeledSex) {
    const v = labeledSex[1].toLowerCase();
    if (/^(女|f|female|girl)$/i.test(labeledSex[1])) result.sex = "girl";
    else if (/^(男|m|male|boy)$/i.test(labeledSex[1])) result.sex = "boy";
  }
  // (b) Standalone Chinese 男/女 (already handled by general scan below)
  if (!result.sex) {
    if (/(?:^|[\s,，:：])女(?:[\s,，.。$]|$)/.test(fullText)) result.sex = "girl";
    else if (/(?:^|[\s,，:：])男(?:[\s,，.。$]|$)/.test(fullText)) result.sex = "boy";
  }
  // (c) English words
  if (!result.sex) {
    if (/\b(female|girl)\b/i.test(fullText)) result.sex = "girl";
    else if (/\b(male|boy)\b/i.test(fullText)) result.sex = "boy";
  }
  // (d) Lone "F" or "M" — surrounded by whitespace or punctuation, not part of a word
  if (!result.sex) {
    if (/(?:^|[\s,，:：()])(F|f)(?:[\s,，.。()]|$)/.test(fullText)) result.sex = "girl";
    else if (/(?:^|[\s,，:：()])(M|m)(?:[\s,，.。()]|$)/.test(fullText)) result.sex = "boy";
  }

  // 3. Chart number — 5-10 chars, alphanumeric (letters + digits), must contain at least one digit
  // Common formats: "1092859" (pure digits), "A123456" (letter prefix), "12345A" (letter suffix), "AB12345"
  const labeledChart = fullText.match(/(?:病歷號|病歷|chart\s*no|mrn|chart)[\s:：#]*([A-Za-z0-9]{5,10})/i);
  if (labeledChart) {
    result.chartNo = labeledChart[1];
  } else {
    // Find standalone alphanumeric tokens with at least one digit, 5-10 chars
    // Word boundaries to avoid matching parts of words
    const allTokens = fullText.match(/(?<![A-Za-z0-9/-])[A-Za-z0-9]{5,10}(?![A-Za-z0-9/-])/g) || [];
    // Must contain at least one digit (rules out pure word matches like "female", "Family")
    const candidates = allTokens.filter(t => /\d/.test(t));
    const usedAsBirth = new Set();
    if (result.birth) {
      const compact = result.birth.replace(/-/g, "");
      usedAsBirth.add(compact); // YYYYMMDD
      // ROC equivalents
      const rocY = parseInt(result.birth.slice(0, 4)) - 1911;
      if (rocY > 0) {
        const rocCompact = `${String(rocY).padStart(3, "0")}${result.birth.slice(5, 7)}${result.birth.slice(8, 10)}`;
        usedAsBirth.add(rocCompact);
      }
    }
    for (const n of candidates) {
      if (!usedAsBirth.has(n)) { result.chartNo = n; break; }
    }
  }

  // 4. Name — Chinese 2-4 char sequence, not adjacent to digits or English
  const labeledName = fullText.match(/(?:姓名|病人|name|patient)[\s:：]*([\u4e00-\u9fa5]{2,4})/i);
  if (labeledName) {
    result.name = labeledName[1];
  } else {
    const stopWords = new Set([
      "姓名", "病歷", "性別", "生日", "出生", "日期", "民國", "父親", "母親", "身高", "體重",
      "家族史", "病史", "健保", "卡號", "備註", "診斷", "中親", "標的", "身分證", "電話",
      "地址", "備考", "醫師", "病人", "西元"
    ]);
    const candidates = fullText.match(/[\u4e00-\u9fa5]{2,4}/g) || [];
    for (const c of candidates) {
      if (!stopWords.has(c) && !["男", "女", "公分", "公斤"].includes(c)) {
        result.name = c;
        break;
      }
    }
  }

  // 5. Parent heights
  const fatherMatch = fullText.match(/(?:father|父親|父|爸|爸爸|dad)[\s:：]*(\d{2,3}(?:\.\d)?)\s*(?:cm|公分)?/i);
  if (fatherMatch) {
    const v = parseFloat(fatherMatch[1]);
    if (v >= 100 && v <= 220) result.fatherH = v;
  }
  const motherMatch = fullText.match(/(?:mother|母親|母|媽|媽媽|mom)[\s:：]*(\d{2,3}(?:\.\d)?)\s*(?:cm|公分)?/i);
  if (motherMatch) {
    const v = parseFloat(motherMatch[1]);
    if (v >= 100 && v <= 220) result.motherH = v;
  }

  return result;
}

function PatientForm({ initial, onSave, onCancel }) {
  const [tab, setTab] = useState("manual"); // manual | paste
  const [pasteText, setPasteText] = useState("");
  const [parseHint, setParseHint] = useState(null);
  const [name, setName] = useState(initial?.name || "");
  const [chartNo, setChartNo] = useState(initial?.chartNo || "");
  const [birth, setBirth] = useState(initial?.birth || "");
  const [sex, setSex] = useState(initial?.sex || "boy");
  const [fatherH, setFatherH] = useState(initial?.fatherH ?? "");
  const [motherH, setMotherH] = useState(initial?.motherH ?? "");

  const handleParse = () => {
    const r = parsePatientText(pasteText);
    if (!r) { setParseHint("無法解析貼上的文字"); return; }
    const filled = [];
    if (r.name) { setName(r.name); filled.push(`姓名「${r.name}」`); }
    if (r.chartNo) { setChartNo(r.chartNo); filled.push(`病歷號「${r.chartNo}」`); }
    if (r.birth) { setBirth(r.birth); filled.push(`生日「${r.birth}」`); }
    if (r.sex) { setSex(r.sex); filled.push(`性別「${r.sex === "girl" ? "女" : "男"}」`); }
    if (r.fatherH) { setFatherH(r.fatherH); filled.push(`父親身高「${r.fatherH} cm」`); }
    if (r.motherH) { setMotherH(r.motherH); filled.push(`母親身高「${r.motherH} cm」`); }
    if (filled.length === 0) {
      setParseHint("沒有辨識到任何欄位，請改用手動輸入");
    } else {
      setParseHint(`已自動填入：${filled.join("、")}。請切換到「手動填寫」分頁檢查並補齊資料。`);
      setTab("manual");
    }
  };

  const target = useMemo(() => {
    const f = parseFloat(fatherH), m = parseFloat(motherH);
    if (!f || !m) return null;
    return targetHeight(sex, f, m);
  }, [fatherH, motherH, sex]);

  const submit = () => {
    if (!name.trim() || !birth) { alert("請至少填寫姓名與出生日期"); return; }
    onSave({
      name: name.trim(), chartNo: chartNo.trim(), birth, sex,
      fatherH: parseFloat(fatherH) || null,
      motherH: parseFloat(motherH) || null,
    });
  };

  return (
    <Modal onClose={onCancel} size="md">
      <div className="px-6 py-4 border-b border-stone-200"><h2 className="text-lg font-serif">{initial ? "編輯病人資料" : "新增病人"}</h2></div>
      {!initial && (
        <div className="flex border-b border-stone-200 bg-stone-50">
          <button onClick={() => setTab("manual")} className={`flex-1 py-2.5 text-sm border-b-2 transition ${tab === "manual" ? "border-stone-900 text-stone-900 font-medium bg-white" : "border-transparent text-stone-500 hover:text-stone-900"}`}>手動填寫</button>
          <button onClick={() => setTab("paste")} className={`flex-1 py-2.5 text-sm border-b-2 transition ${tab === "paste" ? "border-stone-900 text-stone-900 font-medium bg-white" : "border-transparent text-stone-500 hover:text-stone-900"}`}>貼上文字辨識</button>
        </div>
      )}
      {tab === "paste" && !initial ? (
        <div className="p-6 space-y-3">
          <div className="text-xs text-stone-500 leading-relaxed">
            可從醫院系統複製文字，貼到下方框中，系統會自動辨識姓名、病歷號、生日、性別、父母身高。<br/>
            支援格式：<code className="bg-stone-100 px-1 py-0.5 rounded">王小明 1092859 106/10/24 女</code> 或 <code className="bg-stone-100 px-1 py-0.5 rounded">[Family history] Father 174 cm Mother 163 cm</code>
          </div>
          <textarea value={pasteText} onChange={e => setPasteText(e.target.value)}
            placeholder={"範例：\n王小明 1092859 民國 106/10/24 女\n[Family history] Father 174 cm Mother 163 cm"}
            rows={8}
            className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900 font-mono text-sm" />
          {parseHint && (
            <div className="text-xs bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 text-emerald-900">{parseHint}</div>
          )}
          <div className="flex gap-2">
            <button onClick={handleParse} disabled={!pasteText.trim()} className="flex-1 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800 disabled:bg-stone-300">解析並填入</button>
            <button onClick={() => { setPasteText(""); setParseHint(null); }} className="px-4 py-2 border border-stone-200 text-stone-600 rounded-lg hover:bg-stone-50">清空</button>
          </div>
          <div className="text-xs text-stone-400">解析後會自動切換到「手動填寫」分頁，請務必檢查每個欄位是否正確再儲存。</div>
        </div>
      ) : (
        <div className="p-6 space-y-4">
          {parseHint && tab === "manual" && (
            <div className="text-xs bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 text-emerald-900">{parseHint}</div>
          )}
          <Field label="姓名"><input value={name} onChange={e => setName(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" autoFocus /></Field>
          <Field label="病歷號"><input value={chartNo} onChange={e => setChartNo(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" /></Field>
          <Field label="出生日期"><DateInput value={birth} onChange={setBirth} /></Field>
          <Field label="性別">
            <div className="flex gap-2">
              <button onClick={() => setSex("boy")} className={`flex-1 py-2 rounded-lg border transition ${sex === "boy" ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600"}`}>男</button>
              <button onClick={() => setSex("girl")} className={`flex-1 py-2 rounded-lg border transition ${sex === "girl" ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600"}`}>女</button>
            </div>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="父親身高 (cm)" hint="選填，用於計算 target height">
              <input type="number" step="0.1" value={fatherH} onChange={e => setFatherH(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
            </Field>
            <Field label="母親身高 (cm)" hint="選填">
              <input type="number" step="0.1" value={motherH} onChange={e => setMotherH(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
            </Field>
          </div>
          {target && (
            <div className="text-sm bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 text-emerald-900">
              <div className="font-medium">Target Height (標的身高)</div>
              <div className="mt-0.5">{fmt(target.mid, 1)} cm <span className="text-stone-500">(範圍 {fmt(target.lower, 1)} – {fmt(target.upper, 1)} cm)</span></div>
            </div>
          )}
        </div>
      )}
      <div className="px-6 py-4 border-t border-stone-200 flex justify-end gap-2">
        <button onClick={onCancel} className="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg">取消</button>
        <button onClick={submit} className="px-4 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800">儲存</button>
      </div>
    </Modal>
  );
}

// =================== Measurement Form ===================
function MeasurementForm({ patient, initial, onSave, onCancel }) {
  const [mode, setMode] = useState(initial?.mode || "date");
  const [measureDate, setMeasureDate] = useState(initial?.measureDate || todayISO());
  const [grade, setGrade] = useState(initial?.grade || "G1");
  const [semester, setSemester] = useState(initial?.semester || "上");
  const [height, setHeight] = useState(initial?.height ?? "");
  const [weight, setWeight] = useState(initial?.weight ?? "");
  const [boneAge, setBoneAge] = useState(initial?.boneAge ?? "");
  const [note, setNote] = useState(initial?.note || "");
  const [recordType, setRecordType] = useState(initial?.recordType || "followup");
  // Treatment fields (optional; for marking treatment start at this visit)
  // Backward-compat: support old `treatment: {...}` single + new `treatments: [{...}, ...]` array
  const initialTxs = initial?.treatments && Array.isArray(initial.treatments) ? initial.treatments
                   : initial?.treatment ? [initial.treatment]
                   : [];
  const [addTreatment, setAddTreatment] = useState(initialTxs.length > 0);
  // Multi-drug selection state. Selected drugs are stored as an array of names.
  // For "其他" custom drug, the custom name is stored in txCustom (only one custom slot).
  const initialSelected = initialTxs.filter(t => !t.isCustom).map(t => t.drug);
  const initialCustom = initialTxs.find(t => t.isCustom);
  const [txDrugs, setTxDrugs] = useState(initialSelected.length || initialCustom ? initialSelected : []);
  const [txCustomEnabled, setTxCustomEnabled] = useState(!!initialCustom);
  const [txCustom, setTxCustom] = useState(initialCustom?.drug || "");
  const [txNote, setTxNote] = useState(initialTxs[0]?.note || "");

  const toggleTxDrug = (name) => {
    setTxDrugs(prev => prev.includes(name) ? prev.filter(d => d !== name) : [...prev, name]);
  };

  const computed = useMemo(() => {
    if (mode === "date") {
      const age = ageFromDates(patient.birth, measureDate);
      return { age, dateUsed: measureDate };
    } else {
      const r = ageFromGradeSemester(patient.birth, grade, semester);
      return { age: r?.age, dateUsed: r?.inferredDate };
    }
  }, [mode, measureDate, grade, semester, patient.birth]);

  const bmi = useMemo(() => {
    const h = parseFloat(height), w = parseFloat(weight);
    if (!h || !w) return null;
    return w / Math.pow(h / 100, 2);
  }, [height, weight]);

  const ref = computed.age != null ? refAt(computed.age, patient.sex) : null;
  const bref = computed.age != null ? bmiRefAt(computed.age, patient.sex) : null;
  const stats = ref ? {
    h_pct: percentileFromRef(parseFloat(height), ref, "h"),
    w_pct: percentileFromRef(parseFloat(weight), ref, "w"),
    bmi_cat: bmi != null && bref ? bmiCategory(bmi, bref) : null,
  } : null;

  const pah = useMemo(() => {
    const ba = parseFloat(boneAge), h = parseFloat(height);
    if (!ba || !h || computed.age == null) return null;
    return computePAH(patient.sex, ba, computed.age, h);
  }, [boneAge, height, computed.age, patient.sex]);

  const pah2 = useMemo(() => {
    const ba = parseFloat(boneAge), h = parseFloat(height);
    if (!ba || !h) return null;
    return computePAH2(patient.sex, ba, h);
  }, [boneAge, height, patient.sex]);

  const target = useMemo(() => targetHeight(patient.sex, patient.fatherH, patient.motherH), [patient.sex, patient.fatherH, patient.motherH]);

  const submit = () => {
    const h = parseFloat(height), w = parseFloat(weight);
    if (!h && !w) { alert("請至少填寫身高或體重其中一項"); return; }
    if (computed.age == null) { alert("無法計算年齡，請檢查日期或年級設定"); return; }
    if (computed.age < 0 || computed.age > 18.5) { alert("年齡超出參考範圍 (0-18.5 歲)"); return; }
    let treatments = null;
    if (addTreatment) {
      const list = [];
      // Add each selected preset drug as its own treatment record
      for (const drug of txDrugs) {
        // Reuse id if there was a matching existing treatment for this drug
        const existing = initialTxs.find(t => !t.isCustom && t.drug === drug);
        list.push({
          id: existing?.id || uid(),
          drug,
          isCustom: false,
          note: txNote,
        });
      }
      // Add custom drug if enabled
      if (txCustomEnabled) {
        const customName = txCustom.trim();
        if (!customName) { alert("請填寫自訂藥物名稱"); return; }
        const existingCustom = initialTxs.find(t => t.isCustom);
        list.push({
          id: existingCustom?.id || uid(),
          drug: customName,
          isCustom: true,
          note: txNote,
        });
      }
      if (list.length === 0) {
        alert("請至少選擇一種治療藥物，或取消勾選「此次新增治療」");
        return;
      }
      treatments = list;
    }
    onSave({
      id: initial?.id || uid(),
      mode,
      measureDate: mode === "date" ? measureDate : computed.dateUsed,
      grade: mode === "grade" ? grade : null,
      semester: mode === "grade" ? semester : null,
      age: computed.age,
      height: h || null, weight: w || null, bmi,
      boneAge: parseFloat(boneAge) || null,
      treatments,
      recordType,
      note,
      createdAt: initial?.createdAt || new Date().toISOString(),
    });
  };

  return (
    <Modal onClose={onCancel} size="md">
      <div className="px-6 py-4 border-b border-stone-200 sticky top-0 bg-white z-10">
        <h2 className="text-lg font-serif">{initial ? "編輯測量紀錄" : "新增測量紀錄"}</h2>
      </div>
      <div className="p-6 space-y-4">
        <div className="flex gap-2 p-1 bg-stone-100 rounded-lg">
          <button onClick={() => setMode("date")} className={`flex-1 py-2 rounded-md text-sm transition ${mode === "date" ? "bg-white shadow-sm font-medium" : "text-stone-600"}`}>實際量測日期</button>
          <button onClick={() => setMode("grade")} className={`flex-1 py-2 rounded-md text-sm transition ${mode === "grade" ? "bg-white shadow-sm font-medium" : "text-stone-600"}`}>年級 + 學期</button>
        </div>
        {mode === "date" ? (
          <Field label="量測日期"><DateInput value={measureDate} onChange={setMeasureDate} /></Field>
        ) : (
          <>
            <Field label="年級">
              <select value={grade} onChange={e => setGrade(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900">
                {GRADE_OPTIONS.map(g => <option key={g.value} value={g.value}>{g.label}</option>)}
              </select>
            </Field>
            <Field label="學期">
              <div className="flex gap-2">
                <button onClick={() => setSemester("上")} className={`flex-1 py-2 rounded-lg border transition ${semester === "上" ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600"}`}>上學期 (9月)</button>
                <button onClick={() => setSemester("下")} className={`flex-1 py-2 rounded-lg border transition ${semester === "下" ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600"}`}>下學期 (2月)</button>
              </div>
            </Field>
            {computed.dateUsed && <div className="text-xs text-stone-500 -mt-2">推算量測日：{computed.dateUsed}</div>}
          </>
        )}
        <div className="text-sm bg-stone-50 rounded-lg px-3 py-2 text-stone-700">
          {computed.age != null ? <>計算年齡：<span className="font-semibold">{fmt(computed.age, 2)} 歲</span> ({Math.floor(computed.age * 12)} 個月)</> : <span className="text-stone-400">尚無法計算年齡</span>}
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="身高 (cm)"><input type="number" step="0.1" value={height} onChange={e => setHeight(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" /></Field>
          <Field label="體重 (kg)"><input type="number" step="0.1" value={weight} onChange={e => setWeight(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" /></Field>
        </div>
        <Field label="骨齡 (歲)" hint="選填，例如 11.5">
          <input type="number" step="0.1" value={boneAge} onChange={e => setBoneAge(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
        </Field>
        {bmi != null && <div className="text-sm bg-stone-50 rounded-lg px-3 py-2 text-stone-700">BMI：<span className="font-semibold">{fmt(bmi, 2)}</span></div>}
        {stats && (
          <div className="grid grid-cols-3 gap-2 text-center text-xs">
            <div className="bg-white border border-stone-200 rounded-lg p-2">
              <div className="text-stone-500">身高 百分位</div>
              <div className={`font-bold text-base ${pctClass(stats.h_pct)}`}>{stats.h_pct == null ? "—" : `${fmt(stats.h_pct, 1)}%`}</div>
            </div>
            <div className="bg-white border border-stone-200 rounded-lg p-2">
              <div className="text-stone-500">體重 百分位</div>
              <div className={`font-bold text-base ${pctClass(stats.w_pct)}`}>{stats.w_pct == null ? "—" : `${fmt(stats.w_pct, 1)}%`}</div>
            </div>
            <div className="bg-white border border-stone-200 rounded-lg p-2">
              <div className="text-stone-500">BMI 分類</div>
              <div className="font-bold text-base" style={{ color: stats.bmi_cat?.color || "#78716c" }}>{stats.bmi_cat?.label || "—"}</div>
            </div>
          </div>
        )}
        {(pah || pah2) && (
          <PAHDisplay pah={pah} pah2={pah2} target={target} boneAge={parseFloat(boneAge)} />
        )}
        <Field label="紀錄類型">
          <div className="flex gap-2">
            <button onClick={() => setRecordType("initial")} className={`flex-1 py-2 rounded-lg border text-sm transition ${recordType === "initial" ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600"}`}>初診</button>
            <button onClick={() => setRecordType("followup")} className={`flex-1 py-2 rounded-lg border text-sm transition ${recordType === "followup" ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600"}`}>複診</button>
          </div>
          <div className="text-xs text-stone-400 mt-1">初診紀錄在曲線上以 × 標示，複診以 ● 標示</div>
        </Field>
        <div className="border-t border-stone-200 pt-4">
          <label className="flex items-center gap-2 text-sm cursor-pointer mb-2">
            <input type="checkbox" checked={addTreatment} onChange={e => setAddTreatment(e.target.checked)} />
            <span className="font-medium text-stone-900 flex items-center gap-1.5"><Activity size={14} /> 此次新增治療</span>
          </label>
          {addTreatment && (
            <div className="space-y-3 pl-1 mt-2">
              <Field label="藥物 (可複選)">
                <div className="grid grid-cols-2 gap-2">
                  {TX_PRESETS.map(p => (
                    <button key={p.name} onClick={() => toggleTxDrug(p.name)} className={`py-1.5 rounded-lg border text-sm transition flex items-center justify-center gap-1.5 ${txDrugs.includes(p.name) ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600 hover:bg-stone-50"}`}>
                      <span className={`inline-block w-2 h-2 rounded-full`} style={{ background: txDrugs.includes(p.name) ? "white" : p.color }}></span>
                      {p.name}
                    </button>
                  ))}
                  <button onClick={() => setTxCustomEnabled(!txCustomEnabled)} className={`py-1.5 rounded-lg border text-sm transition ${txCustomEnabled ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-600 hover:bg-stone-50"}`}>
                    其他
                  </button>
                </div>
                {(txDrugs.length > 0 || txCustomEnabled) && (
                  <div className="text-xs text-stone-500 mt-1.5">
                    已選 {txDrugs.length + (txCustomEnabled ? 1 : 0)} 種：{[...txDrugs, txCustomEnabled ? (txCustom.trim() || "(其他)") : null].filter(Boolean).join("、")}
                  </div>
                )}
              </Field>
              {txCustomEnabled && (
                <Field label="自訂藥物名稱">
                  <input value={txCustom} onChange={e => setTxCustom(e.target.value)} placeholder="例如：Anastrozole" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
                </Field>
              )}
              <Field label="治療備註 (選填)">
                <input value={txNote} onChange={e => setTxNote(e.target.value)} placeholder="劑量、頻率等（套用至所有勾選的藥物）" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
              </Field>
              <div className="text-xs text-stone-500">每個藥物各自成為一筆治療紀錄，並在生長曲線上以不同顏色的垂直虛線標示</div>
            </div>
          )}
        </div>
        <Field label="備註 (選填)"><input value={note} onChange={e => setNote(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" /></Field>
      </div>
      <div className="px-6 py-4 border-t border-stone-200 flex justify-end gap-2 sticky bottom-0 bg-white z-10">
        <button onClick={onCancel} className="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg">取消</button>
        <button onClick={submit} className="px-4 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800">儲存</button>
      </div>
    </Modal>
  );
}

function pctClass(pct) {
  if (pct == null || isNaN(pct)) return "text-stone-400";
  if (pct < 3 || pct > 97) return "text-red-600";
  if (pct < 15 || pct > 85) return "text-amber-600";
  return "text-emerald-700";
}

// Display both PAH algorithms side-by-side
function PAHDisplay({ pah, pah2, target, boneAge }) {
  const inTarget = (val) => target && val != null && val >= target.lower && val <= target.upper;
  return (
    <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 space-y-2 text-sm">
      <div className="flex items-center gap-2 font-medium text-indigo-900">
        <TrendingUp size={14} /> 預測成人身高
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
        {/* Method 1: Bayley-Pinneau */}
        <div className="bg-white rounded-md border border-indigo-100 p-2.5">
          <div className="text-[11px] font-medium text-indigo-700 uppercase tracking-wider">方法一 · Bayley-Pinneau</div>
          {pah ? (
            pah.outOfRange ? (
              <div className="text-xs text-amber-700 mt-1">
                骨齡分組：{pah.category === "avg" ? "average" : pah.category === "acc" ? "advanced" : "delayed"}
                <div className="mt-0.5">骨齡 {fmt(boneAge, 1)} 超出表範圍 {pah.rangeMin != null && `(${fmt(pah.rangeMin, 2)}–${fmt(pah.rangeMax, 2)} 歲)`}</div>
              </div>
            ) : (
              <>
                <div className="mt-1">
                  <span className="text-lg font-bold text-indigo-900">{fmt(pah.pah, 1)} cm</span>
                  {target && (
                    <span className={`ml-2 text-xs ${inTarget(pah.pah) ? "text-emerald-700" : "text-amber-700"}`}>
                      {inTarget(pah.pah) ? "✓ 在 target 內" : "✗ 超出 target"}
                    </span>
                  )}
                </div>
                <div className="text-[11px] text-stone-500 mt-0.5">
                  分組 {pah.category === "avg" ? "average" : pah.category === "acc" ? "advanced" : "delayed"}（{fmt(pah.percent, 1)}%）
                </div>
              </>
            )
          ) : <div className="text-xs text-stone-400 mt-1">—</div>}
        </div>
        {/* Method 2: Bone-age z-score projection */}
        <div className="bg-white rounded-md border border-indigo-100 p-2.5">
          <div className="text-[11px] font-medium text-indigo-700 uppercase tracking-wider">方法二 · 骨齡百分位投射</div>
          {pah2 ? (
            pah2.outOfRange ? (
              <div className="text-xs text-amber-700 mt-1">{pah2.reason}</div>
            ) : (
              <>
                <div className="mt-1">
                  <span className="text-lg font-bold text-indigo-900">{fmt(pah2.pah, 1)} cm</span>
                  {target && (
                    <span className={`ml-2 text-xs ${inTarget(pah2.pah) ? "text-emerald-700" : "text-amber-700"}`}>
                      {inTarget(pah2.pah) ? "✓ 在 target 內" : "✗ 超出 target"}
                    </span>
                  )}
                </div>
                <div className="text-[11px] text-stone-500 mt-0.5">
                  骨齡 {fmt(boneAge, 1)} 歲 · 百分位 {fmt(pah2.percentile, 1)}% · z={fmt(pah2.z, 2)}
                </div>
              </>
            )
          ) : <div className="text-xs text-stone-400 mt-1">—</div>}
        </div>
      </div>
      {target && (
        <div className="text-[11px] text-indigo-700 px-1">
          Target height 範圍：{fmt(target.lower, 1)}–{fmt(target.upper, 1)} cm（中親 {fmt(target.mid, 1)}）
        </div>
      )}
    </div>
  );
}

function BoneAgeForm({ patient, initial, onSave, onCancel }) {
  const [measureDate, setMeasureDate] = useState(initial?.measureDate || todayISO());
  const [boneAge, setBoneAge] = useState(initial?.boneAge ?? "");
  const [linkedHeight, setLinkedHeight] = useState(initial?.linkedHeight ?? "");
  const [note, setNote] = useState(initial?.note || "");

  const chronoAge = useMemo(() => ageFromDates(patient.birth, measureDate), [patient.birth, measureDate]);

  // Find nearest height measurement
  const nearestM = useMemo(() => {
    const ms = (patient.measurements || []).filter(m => m.height != null);
    if (ms.length === 0) return null;
    const targetTime = new Date(measureDate).getTime();
    return ms.reduce((best, m) => {
      const diff = Math.abs(new Date(m.measureDate).getTime() - targetTime);
      return (!best || diff < best.diff) ? { m, diff } : best;
    }, null)?.m;
  }, [patient.measurements, measureDate]);

  const heightForCalc = parseFloat(linkedHeight) || nearestM?.height;
  const pah = useMemo(() => {
    const ba = parseFloat(boneAge);
    if (!ba || !heightForCalc || chronoAge == null) return null;
    return computePAH(patient.sex, ba, chronoAge, heightForCalc);
  }, [boneAge, heightForCalc, chronoAge, patient.sex]);

  const pah2 = useMemo(() => {
    const ba = parseFloat(boneAge);
    if (!ba || !heightForCalc) return null;
    return computePAH2(patient.sex, ba, heightForCalc);
  }, [boneAge, heightForCalc, patient.sex]);

  const target = useMemo(() => targetHeight(patient.sex, patient.fatherH, patient.motherH), [patient.sex, patient.fatherH, patient.motherH]);

  const submit = () => {
    const ba = parseFloat(boneAge);
    if (!ba) { alert("請填寫骨齡"); return; }
    if (chronoAge == null) { alert("無法計算年齡"); return; }
    onSave({
      id: initial?.id || uid(),
      measureDate,
      chronoAge,
      boneAge: ba,
      linkedHeight: parseFloat(linkedHeight) || null,
      note,
      createdAt: initial?.createdAt || new Date().toISOString(),
    });
  };

  return (
    <Modal onClose={onCancel} size="md">
      <div className="px-6 py-4 border-b border-stone-200"><h2 className="text-lg font-serif flex items-center gap-2"><Bone size={18} /> {initial ? "編輯骨齡紀錄" : "新增骨齡紀錄"}</h2></div>
      <div className="p-6 space-y-4">
        <Field label="檢查日期"><DateInput value={measureDate} onChange={setMeasureDate} /></Field>
        {chronoAge != null && (
          <div className="text-sm bg-stone-50 rounded-lg px-3 py-2 text-stone-700">
            實際年齡：<span className="font-semibold">{fmt(chronoAge, 2)} 歲</span>
          </div>
        )}
        <Field label="骨齡 (歲)"><input type="number" step="0.1" value={boneAge} onChange={e => setBoneAge(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" autoFocus /></Field>
        <Field label="當下身高 (cm)" hint={nearestM ? `留空則使用最近一次身高紀錄：${fmt(nearestM.height, 1)} cm (${nearestM.measureDate})` : "目前沒有身高紀錄可使用"}>
          <input type="number" step="0.1" value={linkedHeight} onChange={e => setLinkedHeight(e.target.value)} placeholder={nearestM ? `預設使用 ${fmt(nearestM.height, 1)}` : ""} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" />
        </Field>
        {(pah || pah2) && (
          <PAHDisplay pah={pah} pah2={pah2} target={target} boneAge={parseFloat(boneAge)} />
        )}
        <Field label="備註 (選填)"><input value={note} onChange={e => setNote(e.target.value)} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-900" /></Field>
      </div>
      <div className="px-6 py-4 border-t border-stone-200 flex justify-end gap-2">
        <button onClick={onCancel} className="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg">取消</button>
        <button onClick={submit} className="px-4 py-2 bg-stone-900 text-white rounded-lg hover:bg-stone-800">儲存</button>
      </div>
    </Modal>
  );
}
